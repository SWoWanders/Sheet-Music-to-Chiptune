<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chiptune System v2.4</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; --dim: #004411; --err: #ff3333; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .terminal { width: 95%; max-width: 900px; border: 2px solid var(--neon); padding: 20px; background: #000; box-shadow: 0 0 20px rgba(0,255,65,0.3); }
        h1 { text-align: center; border-bottom: 2px solid var(--neon); padding-bottom: 10px; text-shadow: 0 0 8px var(--neon); margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel { border: 1px solid var(--dim); padding: 15px; background: #050505; }
        input, textarea { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; font-family: inherit; width: 100%; box-sizing: border-box; }
        label { font-size: 0.7em; color: #888; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        /* Fixed Progress Bar */
        .progress-container { width: 100%; height: 12px; background: #111; border: 1px solid var(--dim); margin-top: 10px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--neon); transition: width 0.2s; }
        .loading-pulse { animation: pulse 1.5s infinite linear; background: linear-gradient(90deg, var(--neon), var(--dim), var(--neon)); background-size: 200% 100%; }
        @keyframes pulse { 0% { background-position: 200% 0; } 100% { background-position: 0 0; } }

        canvas { width: 100%; height: 100px; background: #000; border: 1px solid var(--dim); margin: 10px 0; }
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        button { background: var(--neon); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.2s; }
        #stop-btn { background: var(--err); color: white; flex: 1; }
        
        /* New Error Log Panel */
        #error-log { color: var(--err); font-size: 0.7em; margin-top: 10px; border: 1px solid var(--err); padding: 5px; display: none; background: #1a0000; }
        .status { font-size: 0.7em; text-align: center; margin-top: 10px; color: var(--neon); }
    </style>
</head>
<body>

<div class="terminal">
    <h1>CHIPTUNE_CORE_v2.4</h1>
    <div class="grid">
        <div class="panel">
            <label>1. API & SOURCE</label>
            <input type="text" id="api-key" placeholder="Enter Gemini Key...">
            <input type="file" id="file-input" style="margin-top:10px;">
            <button onclick="analyzeWithPrecision()">RUN_ANALYSIS</button>
            <div class="progress-container"><div id="progress-bar"></div></div>
            <div id="error-log"></div>
        </div>
        <div class="panel">
            <label>2. MODULATION</label>
            <div style="font-size: 0.7em;">TEMPO: <input type="range" id="tempo-scale" min="0.2" max="3.0" step="0.1" value="1.0"></div>
            <div style="font-size: 0.7em; margin-top:10px;">PITCH: <input type="range" id="pitch-scale" min="0.5" max="2.0" step="0.1" value="1.0"></div>
            <div style="font-size: 0.7em; margin-top:10px;">VIBRATO: <input type="range" id="vibrato-depth" min="0" max="20" step="1" value="0"></div>
        </div>
    </div>

    <canvas id="visualizer"></canvas>
    <textarea id="abc-input" rows="6" placeholder="ABC data..."></textarea>

    <div class="btn-row">
        <button onclick="playAndRecord()">▶ PLAY & RECORD</button>
        <button id="stop-btn" onclick="stopAll()">■ STOP</button>
    </div>
    
    <div class="status" id="status-msg">SYSTEM_READY</div>
    <a id="download-link" style="display:none; color:white; margin-top:10px; text-align:center; display:block;"></a>
</div>
