<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chiptune System v2.9 - Universal Fallback</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; --dim: #004411; --err: #ff3333; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .terminal { width: 98%; max-width: 900px; border: 2px solid var(--neon); padding: 15px; background: #000; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        .panel { border: 1px solid var(--dim); padding: 12px; background: #050505; }
        input, textarea { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; font-family: inherit; width: 100%; box-sizing: border-box; font-size: 14px; }
        
        .progress-container { width: 100%; height: 14px; background: #111; border: 1px solid var(--dim); margin: 15px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--neon); transition: width 0.3s ease; }
        .pulse { animation: pulse-anim 1.5s infinite linear; background: linear-gradient(90deg, var(--neon), var(--dim), var(--neon)); background-size: 200% 100%; }
        @keyframes pulse-anim { 0% { background-position: 200% 0; } 100% { background-position: 0 0; } }

        #console-monitor { width: 100%; height: 100px; background: #001100; border: 1px solid var(--dim); color: #00ff00; font-size: 10px; overflow-y: auto; padding: 5px; margin-top: 10px; white-space: pre-wrap; border-left: 3px solid var(--neon); }
        button { background: var(--neon); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 5px; }
        canvas { width: 100%; height: 80px; background: #000; border: 1px solid var(--dim); margin-top: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="text-align:center; margin: 0 0 15px 0; font-size: 1.2em;">CHIPTUNE_CORE_v2.9</h2>
    <div class="grid">
        <div class="panel">
            <label style="font-size:0.7em;">1. AUTH & UPLOAD</label>
            <input type="password" id="api-key" placeholder="Paste Gemini Key...">
            <input type="file" id="file-input" accept="image/*" style="margin-top:10px;">
            <button onclick="analyzeWithPrecision()">RUN_ANALYSIS</button>
            <div class="progress-container"><div id="progress-bar"></div></div>
        </div>
        <div class="panel">
            <label style="font-size:0.7em;">2. MODULATION</label>
            <div style="font-size:0.7em;">TEMPO: <input type="range" id="tempo-scale" min="0.2" max="3.0" step="0.1" value="1.0"></div>
            <div style="font-size:0.7em; margin-top:8px;">PITCH: <input type="range" id="pitch-scale" min="0.5" max="2.0" step="0.1" value="1.0"></div>
            <div style="font-size:0.7em; margin-top:8px;">VIBRATO: <input type="range" id="vibrato-depth" min="0" max="20" step="1" value="0"></div>
        </div>
    </div>

    <label style="font-size:0.7em;">3. DIAGNOSTIC_LOG</label>
    <div id="console-monitor">SYSTEM_IDLE...</div>
    <canvas id="visualizer"></canvas>
    <textarea id="abc-input" rows="5" placeholder="ABC buffer..."></textarea>

    <div style="display:flex; gap:10px; margin-top:15px;">
        <button onclick="playAndRecord()" style="flex:2;">▶ PLAY & RECORD</button>
        <button onclick="stopAll()" style="background:var(--err); color:white; flex:1;">■ STOP</button>
    </div>
    <a id="download-link" style="display:none; color:white; text-align:center; margin-top:10px; font-size:0.8em;"></a>
</div>
