<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chiptune System v1.6</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; --dim: #004411; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .terminal { width: 95%; max-width: 900px; border: 2px solid var(--neon); padding: 20px; background: #000; box-shadow: 0 0 20px rgba(0,255,65,0.3); }
        h1 { text-align: center; border-bottom: 2px solid var(--neon); padding-bottom: 10px; text-shadow: 0 0 8px var(--neon); margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel { border: 1px solid var(--dim); padding: 15px; background: #050505; }
        input, select, textarea { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; font-family: inherit; outline: none; width: 100%; box-sizing: border-box; }
        label { font-size: 0.8em; text-transform: uppercase; margin-bottom: 5px; display: block; color: #888; }
        canvas { width: 100%; height: 100px; background: #000; border: 1px solid var(--dim); margin: 10px 0; }
        .controls { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        button { background: var(--neon); color: #000; border: none; padding: 12px 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; flex: 1; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        #stop-btn { background: #ff3333; color: white; flex: 0.4; }
        #download-link { display: none; color: #fff; text-align: center; font-weight: bold; padding: 15px; border: 1px solid #fff; margin-top: 10px; text-decoration: none; background: #222; }
        .status { font-size: 0.8em; text-align: center; color: #888; margin-top: 10px; font-style: italic; }
        .slider-group { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .slider-group span { min-width: 60px; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>CHIPTUNE_CORE_v1.6</h1>
    <div class="grid">
        <div class="panel">
            <label>1. AUTH & SOURCE</label>
            <input type="text" id="api-key" placeholder="Gemini API Key...">
            <label style="margin-top:15px;">2. SOURCE IMAGE</label>
            <input type="file" id="file-input" accept="image/*">
            <button onclick="analyzeImage()" style="margin-top:10px;">RUN_ANALYSIS</button>
        </div>
        <div class="panel">
            <label>3. SIGNAL SCALING</label>
            <div class="slider-group"><span>TEMPO</span><input type="range" id="tempo-scale" min="0.1" max="4.0" step="0.1" value="1.0"></div>
            <div class="slider-group"><span>PITCH</span><input type="range" id="pitch-scale" min="0.2" max="2.0" step="0.1" value="1.0"></div>
            <label>OSCILLOSCOPE</label>
            <canvas id="visualizer"></canvas>
        </div>
    </div>
    <label>ABC_DATA_BUFFER</label>
    <textarea id="abc-input" placeholder="Awaiting transcription..."></textarea>
    <div class="controls">
        <button onclick="playAndRecord()">▶ PLAY & RECORD</button>
        <button id="stop-btn" onclick="stopAll()">■ STOP</button>
    </div>
    <a id="download-link">INITIATE_DOWNLOAD</a>
    <div class="status" id="status-msg">SYSTEM_READY // VISUALIZER_ONLINE</div>
</div>

<script>
    const noteMap = {
        "C": 261.63, "^C": 277.18, "_D": 277.18, "D": 293.66, "^D": 311.13, "_E": 311.13, "E": 329.63, "F": 349.23, "^F": 369.99, "_G": 369.99, "G": 392.00, "^G": 415.30, "_A": 415.30, "A": 440.00, "^A": 466.16, "_B": 466.16, "B": 493.88, "z": 0
    };

    let audioCtx = null, activeSources = [], recorder = null, audioChunks = [], analyzer = null;

    async function analyzeImage() {
        const apiKey = document.getElementById('api-key').value;
        const fileInput = document.getElementById('file-input');
        const status = document.getElementById('status-msg');
        if (!apiKey || !fileInput.files[0]) return alert("Key and Image required.");
        status.innerText = "SIGNAL_PROCESSING...";
        try {
            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = async () => {
                const base64Data = reader.result.split(',')[1];
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [
                        { text: "Transcribe to ABC. Use simple notation. [V:1] melody, [V:2] bass. Ensure octaves and accidentals are marked." },
                        { inline_data: { mime_type: fileInput.files[0].type, data: base64Data } }
                    ] }] })
                });
                const data = await response.json();
                document.getElementById('abc-input').value = data.candidates[0].content.parts[0].text.replace(/```abc|```/g, '').trim();
                status.innerText = "TRANSCRIPTION_COMPLETE";
            };
        } catch (e) { status.innerText = "ERROR: " + e.message; }
    }

    function draw() {
        if (!analyzer) return;
        requestAnimationFrame(draw);
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const bufferLength = analyzer.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyzer.getByteTimeDomainData(dataArray);
        ctx.fillStyle = 'black'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 2; ctx.strokeStyle = '#00ff41';
        ctx.beginPath();
        const sliceWidth = canvas.width * 1.0 / bufferLength;
        let x = 0;
        for (let i = 0; i < bufferLength; i++) {
            const v = dataArray[i] / 128.0;
            const y = v * canvas.height / 2;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            x += sliceWidth;
        }
        ctx.lineTo(canvas.width, canvas.height / 2); ctx.stroke();
    }

    function stopAll() { 
        activeSources.forEach(s => { try { s.stop(); } catch(e) {} }); 
        activeSources = []; 
        if (recorder?.state === "recording") recorder.stop(); 
    }

    async function playAndRecord() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        stopAll();
        analyzer = audioCtx.createAnalyser();
        analyzer.fftSize = 2048;
        draw();

        const tempo = 0.5 / parseFloat(document.getElementById('tempo-scale').value);
        const pitch = parseFloat(document.getElementById('pitch-scale').value);
        const dest = audioCtx.createMediaStreamDestination();
        recorder = new MediaRecorder(dest.stream);
        audioChunks = [];
        recorder.ondataavailable = e => audioChunks.push(e.data);
        recorder.onstop = () => {
            const url = URL.createObjectURL(new Blob(audioChunks, { type: 'audio/webm' }));
            const link = document.getElementById('download-link');
            link.href = url; link.download = `render_${Date.now()}.webm`; link.style.display = 'block';
        };

        const raw = document.getElementById('abc-input').value;
        const voices = { "[V:1]": [], "[V:2]": [] };
        raw.split('\n').forEach(line => {
            if (line.includes('[V:1]')) voices["[V:1]"] = voices["[V:1]"].concat(line.split('[V:1]')[1].trim().split(/\s+/));
            if (line.includes('[V:2]')) voices["[V:2]"] = voices["[V:2]"].concat(line.split('[V:2]')[1].trim().split(/\s+/));
        });

        recorder.start();
        const d1 = playStream(voices["[V:1]"], audioCtx.currentTime + 0.1, tempo, 'square', 0.1, dest, pitch);
        const d2 = playStream(voices["[V:2]"], audioCtx.currentTime + 0.1, tempo, 'triangle', 0.15, dest, pitch);
        setTimeout(() => recorder.stop(), (Math.max(d1, d2) * 1000) + 1000);
        document.getElementById('status-msg').innerText = "RECORDING...";
    }

    function playStream(symbols, start, tempo, type, vol, dest, pitchScale) {
        let playhead = start;
        symbols.forEach(s => {
            if (!s || s.startsWith('%')) return;
            let match = s.match(/^([\^\\_]*)([a-gA-G,zZ]+)([']*)([\d\/]*)$/);
            if (!match) return;
            let accidental = match[1], noteBase = match[2].toUpperCase(), octaves = match[3], dur = match[4];
            let freq = noteMap[accidental + noteBase.replace(/[,]/g, '')] || noteMap[noteBase.replace(/[,]/g, '')];
            if (freq) {
                if (match[2].toLowerCase() === match[2]) freq *= 2;
                if (match[2].includes(',')) freq /= Math.pow(2, (match[2].match(/,/g) || []).length);
                if (octaves) freq *= Math.pow(2, octaves.length);
                let durFactor = dur.includes('/') ? (parseFloat(dur.split('/')[0]) || 1) / (parseFloat(dur.split('/')[1]) || 2) : (parseFloat(dur) || 1);
                scheduleNote(freq * pitchScale, playhead, tempo * durFactor, type, vol, dest);
                playhead += (tempo * durFactor);
            } else { playhead += tempo; }
        });
        return playhead - start;
    }

    function scheduleNote(freq, time, dur, type, vol, dest) {
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, time);
        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(vol, time + 0.01);
        gain.gain.linearRampToValueAtTime(0, time + dur);
        osc.connect(gain).connect(audioCtx.destination);
        gain.connect(analyzer); gain.connect(dest);
        osc.start(time); osc.stop(time + dur);
        activeSources.push(osc);
    }
</script>
</body>
</html>
