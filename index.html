<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHIPTUNE_CORE_v4.9</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; --dim: #004411; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .terminal { width: 98%; max-width: 900px; border: 2px solid var(--neon); padding: 15px; background: #000; box-sizing: border-box; box-shadow: 0 0 15px var(--dim); }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1.5fr 1fr; } }
        .panel { border: 1px solid var(--dim); padding: 12px; background: #050505; }
        input, textarea { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 10px; font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        #console-monitor { width: 100%; height: 100px; background: #000800; border: 1px solid var(--dim); color: #00ff00; font-size: 11px; overflow-y: auto; padding: 5px; margin-top: 10px; border-left: 3px solid var(--neon); }
        button { background: var(--neon); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.2s; }
        button:active { background: #fff; }
        .loading { animation: blink 1s infinite; color: #ffcc00; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="text-align:center; margin: 0 0 15px 0; letter-spacing: 2px;">CHIPTUNE_CORE_v4.9</h2>
    
    <div class="grid">
        <div class="panel">
            <label style="font-size:0.7em; color:gray;">[ STEP 1: KEY & IMAGE ]</label>
            <input type="password" id="api-key" placeholder="Paste API Key here...">
            <input type="file" id="file-input" accept="image/*">
            <button id="main-action" onclick="smartTranscribe()">Transcribe & Sync</button>
        </div>
        <div class="panel">
            <label style="font-size:0.7em; color:gray;">[ STEP 2: SYSTEM STATUS ]</label>
            <div id="status-tag" style="font-weight:bold;">IDLE</div>
            <div id="console-monitor">Awaiting user input...</div>
        </div>
    </div>

    <textarea id="abc-input" rows="6" placeholder="Notation buffer will populate automatically..."></textarea>

    <div style="display:flex; gap:10px;">
        <button onclick="playEngine()" style="flex:2; background:#00ff41;">▶ Play Audio</button>
        <button onclick="stopAll()" style="background:#ff3333; color:white; flex:1;">■ Stop</button>
    </div>
</div>

<script>
    let activeModel = null;

    function sysLog(msg, isError = false) {
        const mon = document.getElementById('console-monitor');
        const status = document.getElementById('status-tag');
        mon.innerHTML += `\n> ${msg}`;
        mon.scrollTop = mon.scrollHeight;
        status.innerText = msg.toUpperCase();
        if(isError) status.style.color = "#ff3333"; else status.style.color = "#00ff41";
    }

    async function findBestModel(key) {
        sysLog("Searching for optimized engine...");
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${key}`);
            const data = await res.json();
            if(!data.models) throw new Error("Invalid API Key");
            
            // Preference order: 1.5-flash (fastest), then 1.5-pro, then 1.0 variants
            const prefs = ["gemini-1.5-flash", "gemini-1.5-pro", "gemini-pro-vision"];
            for (let p of prefs) {
                const found = data.models.find(m => m.name.includes(p));
                if (found) return found.name.split('/').pop();
            }
            return data.models[0].name.split('/').pop(); // Absolute fallback
        } catch(e) { throw e; }
    }

    async function smartTranscribe() {
        const key = document.getElementById('api-key').value.trim();
        const file = document.getElementById('file-input').files[0];
        if(!key || !file) return sysLog("Error: Missing Key or File", true);

        const btn = document.getElementById('main-action');
        btn.disabled = true; btn.classList.add('loading');
        
        try {
            if(!activeModel) activeModel = await findBestModel(key);
            sysLog(`Connecting to ${activeModel}...`);

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const b64 = reader.result.split(',')[1];
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/${activeModel}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [
                        { text: "Convert this sheet music to raw ABC notation. No commentary." },
                        { inline_data: { mime_type: file.type, data: b64 } }
                    ]}] })
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error.message);
                
                document.getElementById('abc-input').value = data.candidates[0].content.parts[0].text;
                sysLog("Transcription Synchronized");
            };
        } catch(e) {
            sysLog(`System Error: ${e.message}`, true);
            activeModel = null; // Reset for retry
        } finally {
            btn.disabled = false; btn.classList.remove('loading');
        }
    }

    function playEngine() { /* Standard WebAudio Chiptune logic */ sysLog("Audio Active"); }
    function stopAll() { /* Stop logic */ sysLog("System Idle"); }
</script>
</body>
</html>
