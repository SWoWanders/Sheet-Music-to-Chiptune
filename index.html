<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sheet Music to Audio v3.7</title>
    <script src="https://cdn.jsdelivr.net/npm/midi-writer-js@2.1.4/browser/index.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; --dim: #004411; --err: #ff3333; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .terminal { width: 98%; max-width: 900px; border: 2px solid var(--neon); padding: 15px; background: #000; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        .panel { border: 1px solid var(--dim); padding: 12px; background: #050505; }
        input, select, textarea { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        #console-monitor { width: 100%; height: 100px; background: #001100; border: 1px solid var(--dim); color: #00ff00; font-size: 10px; overflow-y: auto; padding: 5px; margin-top: 10px; white-space: pre-wrap; }
        button { background: var(--neon); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; }
        canvas { width: 100%; height: 80px; background: #000; border: 1px solid var(--dim); margin-top: 10px; }
        .download-zone { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; }
        .download-btn { color: var(--neon); text-decoration: none; border: 1px solid var(--neon); padding: 8px 15px; font-size: 0.8em; background: rgba(0,255,65,0.1); }
        .download-btn:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="text-align:center; margin: 0 0 10px 0;">CHIPTUNE_CORE_v3.7</h2>
    <div class="grid">
        <div class="panel">
            <label style="font-size:0.7em;">1. IMAGE TO MUSIC SOURCE</label>
            <input type="password" id="api-key" placeholder="API Key...">
            <input type="file" id="file-input" accept="image/*">
            <button onclick="analyzeWithFailsafes()">TRANSCRIBE_IMAGE</button>
        </div>
        <div class="panel">
            <label style="font-size:0.7em;">2. INSTRUMENT & TWEAKS</label>
            <select id="wave-type">
                <option value="sawtooth">GRITTY SAWTOOTH (Tom Waits Style)</option>
                <option value="square">CLASSIC SQUARE (8-Bit NES)</option>
                <option value="triangle">TRIANGLE (Soft/Bass)</option>
                <option value="sine">PURE SINE (Whistle)</option>
            </select>
            <div style="font-size:0.7em;">TEMPO: <input type="range" id="tempo-scale" min="0.2" max="3.0" step="0.1" value="1.0"></div>
            <div style="font-size:0.7em;">VIBRATO: <input type="range" id="vibrato-depth" min="0" max="50" step="1" value="15"></div>
        </div>
    </div>

    <div id="console-monitor">SYSTEM_READY...</div>
    <canvas id="visualizer"></canvas>
    <textarea id="abc-input" rows="4" placeholder="ABC Data Output..."></textarea>

    <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="playAndRecord()" style="flex:2;">▶ RENDER AUDIO + MIDI</button>
        <button onclick="stopAll()" style="background:var(--err); color:white; flex:1;">■ STOP</button>
    </div>
    <div id="download-zone" class="download-zone"></div>
</div>

<script>
    const noteMap = { "C": 261.63, "^C": 277.18, "_D": 277.18, "D": 293.66, "^D": 311.13, "_E": 311.13, "E": 329.63, "F": 349.23, "^F": 369.99, "_G": 369.99, "G": 392.00, "^G": 415.30, "_A": 415.30, "A": 440.00, "^A": 466.16, "_B": 466.16, "B": 493.88, "z": 0 };
    let audioCtx = null, activeSources = [], recorder = null, audioChunks = [], analyzer = null;

    function sysLog(msg) {
        const mon = document.getElementById('console-monitor');
        mon.innerHTML += `\n[${new Date().toLocaleTimeString()}] >> ${msg}`;
        mon.scrollTop = mon.scrollHeight;
    }

    async function analyzeWithFailsafes() {
        const key = document.getElementById('api-key').value.trim();
        const file = document.getElementById('file-input').files[0];
        if(!key || !file) return sysLog("Error: Missing Key or File.");
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = async () => {
            const b64 = reader.result.split(',')[1];
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [
                        { text: "Convert to ABC notation. Use [V:1] for treble, [V:2] for bass. Use [bracket notation] for simultaneous chords. Output raw text ONLY." },
                        { inline_data: { mime_type: file.type, data: b64 } }
                    ]}] })
                });
                const data = await res.json();
                document.getElementById('abc-input').value = data.candidates[0].content.parts[0].text.replace(/```abc|```/g, '').trim();
                sysLog("Transcription Complete. Ready to Render.");
            } catch(e) { sysLog("API Error."); }
        };
    }

    function parseNote(note) {
        let m = note.match(/^([_^^]*)([a-gA-G,zZ]+)([']*)([\d\/]*)$/);
        if (!m) return null;
        let base = m[1] + m[2].toUpperCase().replace(/[,]/g, '');
        let f = noteMap[base] || noteMap[m[2].toUpperCase().replace(/[,]/g, '')];
        if (f === undefined) return null;
        if (m[2].toLowerCase() === m[2]) f *= 2; 
        if (m[2].includes(',')) f /= Math.pow(2, (m[2].match(/,/g) || []).length);
        if (m[3]) f *= Math.pow(2, m[3].length);
        return { f, d: (parseFloat(m[4]) || 1), name: m[2].toUpperCase() + (m[3].length > 0 ? (index === 0 ? "5" : "4") : "3") };
    }

    async function playAndRecord() {
        if (!audioCtx) audioCtx = new AudioContext();
        stopAll(); analyzer = audioCtx.createAnalyser(); draw();
        const dest = audioCtx.createMediaStreamDestination();
        recorder = new MediaRecorder(dest.stream); audioChunks = [];
        recorder.ondataavailable = e => audioChunks.push(e.data);

        const tempo = 0.25 / parseFloat(document.getElementById('tempo-scale').value);
        const wave = document.getElementById('wave-type').value;
        const vib = parseFloat(document.getElementById('vibrato-depth').value);
        const raw = document.getElementById('abc-input').value;
        
        const midiTrack = new MidiWriter.Track();
        midiTrack.setTempo(120);

        const uniqueVoices = [...new Set(raw.match(/V:\d+/g) || ["V:1"])];
        let maxEndTime = 0;

        recorder.start();
        sysLog(`Rendering ${uniqueVoices.length} Polyphonic Tracks...`);

        uniqueVoices.forEach((vTag, idx) => {
            const match = raw.match(new RegExp(`${vTag}\\s*([\\s\\S]*?)(?=V:\\d+|$)`));
            const content = match ? match[1] : (idx === 0 ? raw : "");
            let head = audioCtx.currentTime + 0.1;

            const tokens = content.match(/\[[a-gA-G,']+\d*\]/g) || content.match(/([_^^]*[a-gA-G,zZ]+[']*[\d\/]*)/g) || [];

            tokens.forEach(token => {
                if (token.startsWith('[')) {
                    const chordNotes = token.match(/([_^^]*[a-gA-G,zZ]+[']*[\d\/]*)/g) || [];
                    chordNotes.forEach(n => {
                        const p = parseNote(n);
                        if (p) scheduleNote(p.f, head, tempo * p.d, idx === 0 ? wave : 'triangle', 0.1, dest, vib);
                    });
                    head += tempo;
                } else {
                    const p = parseNote(token);
                    if (p) {
                        scheduleNote(p.f, head, tempo * p.d, idx === 0 ? wave : 'triangle', 0.1, dest, vib);
                        head += (tempo * p.d);
                    }
                }
            });
            maxEndTime = Math.max(maxEndTime, head);
        });

        recorder.onstop = () => {
            const zone = document.getElementById('download-zone');
            zone.innerHTML = '';
            const audioLink = document.createElement('a');
            audioLink.href = URL.createObjectURL(new Blob(audioChunks));
            audioLink.download = "Chiptune_Master.webm"; audioLink.className = "download-btn"; audioLink.innerText = "DOWNLOAD_AUDIO";
            
            const midiLink = document.createElement('a');
            midiLink.href = new MidiWriter.Writer(midiTrack).dataUri();
            midiLink.download = "Notation.mid"; midiLink.className = "download-btn"; midiLink.innerText = "DOWNLOAD_MIDI";
            
            zone.appendChild(audioLink); zone.appendChild(midiLink);
        };

        setTimeout(() => { if(recorder.state==="recording") recorder.stop(); }, (maxEndTime - audioCtx.currentTime) * 1000 + 500);
    }

    function scheduleNote(f, t, d, type, vol, dest, v) {
        if(f <= 0) return;
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(f, t);
        if (v > 0) {
            const lfo = audioCtx.createOscillator(), lg = audioCtx.createGain();
            lfo.frequency.setValueAtTime(6, t); lg.gain.setValueAtTime(v, t);
            lfo.connect(lg); lg.connect(osc.frequency);
            lfo.start(t); lfo.stop(t+d); activeSources.push(lfo);
        }
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol, t + 0.02);
        g.gain.linearRampToValueAtTime(0, t + d);
        osc.connect(g).connect(audioCtx.destination);
        g.connect(analyzer); g.connect(dest);
        osc.start(t); osc.stop(t + d); activeSources.push(osc);
    }

    function draw() {
        if (!analyzer) return; requestAnimationFrame(draw);
        const c = document.getElementById('visualizer'), ctx = c.getContext('2d');
        const d = new Uint8Array(analyzer.frequencyBinCount);
        analyzer.getByteTimeDomainData(d);
        ctx.fillStyle = 'black'; ctx.fillRect(0, 0, c.width, c.height);
        ctx.lineWidth = 2; ctx.strokeStyle = '#00ff41'; ctx.beginPath();
        let x = 0, sl = c.width / d.length;
        for (let i = 0; i < d.length; i++) {
            let y = (d[i] / 128.0) * c.height / 2;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            x += sl;
        }
        ctx.stroke();
    }

    function stopAll() { activeSources.forEach(s => { try{s.stop()}catch(e){} }); activeSources = []; if(recorder?.state==="recording") recorder.stop(); }
</script>
</body>
</html>
