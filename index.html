<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chiptune System v0.8: AI Vision</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .terminal { width: 95%; max-width: 850px; border: 2px solid var(--neon); padding: 20px; background: #000; box-shadow: 0 0 20px rgba(0,255,65,0.3); }
        h1 { text-align: center; border-bottom: 2px solid var(--neon); padding-bottom: 10px; text-shadow: 0 0 8px var(--neon); }
        .setup-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; justify-content: center; border-bottom: 1px hide solid #333; padding-bottom: 15px;}
        input[type="text"] { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 5px; width: 250px; }
        textarea { width: 100%; height: 180px; background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 10px; font-family: inherit; margin: 15px 0; outline: none; resize: none; }
        .controls { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        button { background: var(--neon); color: #000; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        .upload-section { border: 1px dashed var(--neon); padding: 15px; text-align: center; margin-bottom: 15px; }
        #stop-btn { background: #ff3333; color: white; }
        #download-link { color: #fff; text-decoration: underline; display: none; margin-top: 15px; text-align: center; font-weight: bold; }
        .status { font-size: 0.85em; text-align: center; color: #888; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>CHIPTUNE_AI_VISION_v0.8</h1>

    <div class="setup-row">
        <label>API_KEY:</label>
        <input type="text" id="api-key" placeholder="Enter Gemini API Key...">
    </div>

    <div class="upload-section">
        <label>UPLOAD_SHEET_MUSIC_IMAGE:</label><br><br>
        <input type="file" id="file-input" accept="image/*">
        <button onclick="analyzeImage()">AI_ANALYZE</button>
    </div>
    
    <label>[DATA_BUFFER]: ABC_NOTATION</label>
    <textarea id="abc-input">X:1
T:Upload music to begin...</textarea>

    <div class="controls">
        <button onclick="playAndRecord()">▶ PLAY & RECORD</button>
        <button id="stop-btn" onclick="stopAll()">■ STOP</button>
    </div>
    
    <div id="download-zone" style="text-align: center;">
        <a id="download-link">DOWNLOAD_CHIPTUNE_FILE (.webm)</a>
    </div>

    <div class="status" id="status-msg">SYSTEM_READY // AWAITING_INPUT</div>
</div>

<script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
  }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const noteFrequencies = {
        "z": 0, "Z": 0,
        "C,,": 65.41, "D,,": 73.42, "E,,": 82.41, "F,,": 87.31, "G,,": 98.00, "A,,": 110.00, "B,,": 123.47,
        "C,": 130.81, "D,": 146.83, "E,": 164.81, "F,": 174.61, "G,": 196.00, "A,": 220.00, "B,": 246.94,
        "C": 261.63, "D": 293.66, "E": 329.63, "F": 349.23, "G": 392.00, "A": 440.00, "B": 493.88,
        "c": 523.25, "d": 587.33, "e": 659.25, "f": 698.46, "g": 783.99
    };

    let audioCtx = null;
    let activeSources = [];
    let recorder = null;
    let audioChunks = [];

    // --- NEW: AI ANALYSIS LOGIC ---
    window.analyzeImage = async function() {
        const apiKey = document.getElementById('api-key').value;
        const fileInput = document.getElementById('file-input');
        const status = document.getElementById('status-msg');

        if (!apiKey) return alert("Please enter your Gemini API Key first.");
        if (!fileInput.files[0]) return alert("Please select an image file.");

        status.innerText = "AI_IS_READING_MUSIC..._PLEASE_WAIT";

        try {
            const genAI = new GoogleGenerativeAI(apiKey);
            const model = genAI.getGenerativeModel({ 
                model: "gemini-1.5-flash",
                systemInstruction: "You are a music transcription engine. Transcribe sheet music into ABC Notation (V2.1). Output ONLY the ABC code with [V:1] for melody and [V:2] for bass/harmony. No conversation."
            });

            const file = fileInput.files[0];
            const imageData = await fileToGenerativePart(file);

            const result = await model.generateContent([
                "Transcribe this sheet music to ABC notation. Ensure [V:1] and [V:2] are present.",
                imageData
            ]);
            
            const response = await result.response;
            document.getElementById('abc-input').value = response.text();
            status.innerText = "TRANSCRIPTION_SUCCESSFUL";
        } catch (error) {
            console.error(error);
            status.innerText = "ERROR_DURING_AI_ANALYSIS";
        }
    }

    async function fileToGenerativePart(file) {
        const base64EncodedDataPromise = new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
        });
        return {
            inlineData: { data: await base64EncodedDataPromise, mimeType: file.type },
        };
    }

    // --- EXISTING AUDIO LOGIC ---
    window.stopAll = function() {
        activeSources.forEach(s => { try { s.stop(); } catch(e) {} });
        activeSources = [];
        if (recorder && recorder.state === "recording") recorder.stop();
        document.getElementById('status-msg').innerText = "SYSTEM_HALTED";
    }

    window.playAndRecord = async function() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        
        stopAll();
        audioChunks = [];
        document.getElementById('download-link').style.display = 'none';
        
        const status = document.getElementById('status-msg');
        status.innerText = "GENERATING_AUDIO_STREAM...";

        const dest = audioCtx.createMediaStreamDestination();
        recorder = new MediaRecorder(dest.stream);
        
        recorder.ondataavailable = e => audioChunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            const link = document.getElementById('download-link');
            link.href = url;
            link.download = 'chiptune_render.webm';
            link.style.display = 'block';
            status.innerText = "SUCCESS // EXPORT_GENERATED";
        };

        const rawText = document.getElementById('abc-input').value;
        const v1Data = extractVoice(rawText, '[V:1]');
        const v2Data = extractVoice(rawText, '[V:2]');

        const startAt = audioCtx.currentTime + 0.2;
        const d1 = playVoice(v1Data, startAt, 0.5, 'square', 0.08, dest);
        const d2 = playVoice(v2Data, startAt, 0.5, 'triangle', 0.15, dest);

        recorder.start();
        setTimeout(() => { if (recorder.state === "recording") recorder.stop(); }, (Math.max(d1, d2) + 1) * 1000);
    }

    function extractVoice(text, tag) {
        if (!text.includes(tag)) return [];
        let section = text.split(tag)[1].split('[V:')[0];
        let cleaned = section.replace(/\[([A-G,zZ][^\]]*)\]/gi, (m, notes) => notes.split(/[0-9\/]*/)[0]);
        return cleaned.split('|').join(' ').trim().split(/\s+/);
    }

    function playVoice(symbols, start, tempo, type, vol, dest) {
        let playhead = start;
        symbols.forEach(s => {
            let dur = tempo;
            let note = s;
            if (s.includes('/2')) { dur = tempo/2; note = s.replace('/2',''); }
            else if (s.includes('2')) { dur = tempo*2; note = s.replace('2',''); }
            else if (s.includes('3')) { dur = tempo*3; note = s.replace('3',''); }
            if (noteFrequencies[note] !== undefined) scheduleNote(noteFrequencies[note], playhead, dur, type, vol, dest);
            playhead += dur;
        });
        return playhead - start;
    }

    function scheduleNote(freq, time, dur, type, vol, dest) {
        if (freq === 0) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, time);
        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(vol, time + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + dur - 0.02);
        osc.connect(gain).connect(audioCtx.destination);
        gain.connect(dest);
        osc.start(time);
        osc.stop(time + dur);
        activeSources.push(osc);
    }
</script>

</body>
</html>
