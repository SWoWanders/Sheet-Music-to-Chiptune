<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyChip Maestro v9.1</title>
    <style>
        :root { 
            --neon: #00ff41; --bg: #0a0a0a; --dim: #004411; --err: #ff3333; 
            --accent: #0088ff; --warm: #ffaa00; --warn: #ffaa00;
        }
        body { 
            font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); 
            padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0;
            touch-action: manipulation;
        }
        .terminal { 
            width: 98%; max-width: 900px; border: 2px solid var(--neon); padding: 15px; 
            background: #000; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,255,65,0.2);
        }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 700px) { .grid { grid-template-columns: 1fr 1fr; } }
        .panel { border: 1px solid var(--dim); padding: 12px; background: #050505; }
        input, select, textarea { 
            background: #000; border: 1px solid var(--neon); color: var(--neon); 
            padding: 8px; font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 10px;
            font-size: 16px;
        }
        #console-monitor { 
            width: 100%; height: 250px; background: #001100; border: 1px solid var(--dim); 
            color: #00ff00; font-size: 10px; overflow-y: auto; padding: 5px; margin-top: 10px; 
            border-left: 3px solid var(--neon); font-family: monospace;
        }
        button { 
            background: var(--neon); color: #000; border: none; padding: 15px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; 
            margin-bottom: 5px; transition: 0.1s; font-size: 14px; min-height: 44px;
        }
        button:active { filter: brightness(1.5); transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .progress-container { width: 100%; background: #222; height: 8px; margin-bottom: 10px; border: 1px solid var(--dim); display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--neon); transition: width 0.3s; }
        canvas { width: 100%; height: 60px; background: #000; border: 1px solid var(--dim); margin-bottom: 10px; }
        @keyframes pulse { 50% { opacity: 0.7; } }
        .recording { animation: pulse 1s infinite; background: var(--err) !important; color: white; }
        .dl-group { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .dl-btn { background: var(--accent); color: white; font-size: 0.75em; padding: 12px; }
        .play-btn { background: #00cc66; font-size: 1.1em; }
        .record-btn { background: #ff0044; color: white; font-size: 1.1em; }
        .stop-btn { background: var(--err); color: white; }
        .status-indicator { display: inline-block; width: 8px; height: 8px; background: var(--dim); border-radius: 50%; margin-right: 5px; }
        .status-active { background: var(--neon); box-shadow: 0 0 5px var(--neon); }
        .error-msg { color: var(--err); font-weight: bold; }
        .warning-msg { color: var(--warm); }
        .success-msg { color: #00ff41; font-weight: bold; }
        .info-row { display: flex; justify-content: space-between; font-size: 0.7em; color: var(--dim); margin-bottom: 5px; }
        .stats { font-size: 0.8em; color: var(--dim); margin-top: 5px; }
        .control-row { display: flex; gap: 10px; margin-top: 10px; }
        .control-row button { flex: 1; }
        .page-indicator { 
            display: flex; gap: 5px; margin: 10px 0; flex-wrap: wrap; 
            font-size: 0.7em; max-height: 60px; overflow-y: auto;
        }
        .page-btn { 
            background: #333; color: var(--neon); padding: 5px 10px; 
            min-height: auto; width: auto; font-size: 0.8em;
        }
        .page-btn.active { background: var(--neon); color: #000; }
        .page-btn.processed { border: 1px solid var(--neon); }
    </style>
<base target="_blank">
</head>
<body>

<div class="terminal">
    <h2 style="text-align:center; margin: 0 0 10px 0; text-shadow: 0 0 5px var(--neon);">PolyChip Maestro v9.1</h2>
    <div style="text-align:center; font-size:0.7em; color:var(--dim); margin-bottom:15px;">FIXED DOWNLOADS & AUDIO</div>
    
    <div class="grid">
        <div class="panel">
            <label style="font-size:0.7em;">[1. TRANSCRIPTION]</label>
            <input type="password" id="api-key" placeholder="API Key...">
            <input type="file" id="file-input" accept="image/*,.pdf">
            <div class="progress-container" id="p-cont"><div id="progress-bar"></div></div>
            <div id="pdf-pages" class="page-indicator" style="display:none;"></div>
            <button onclick="startWorkflow()" id="process-btn">Process Image</button>
            <button onclick="loadDemo()" style="background:#333; color:var(--neon); font-size:0.8em;">LOAD DEMO</button>
            <div style="font-size:0.65em; margin-top:5px;">
                <span class="status-indicator" id="api-status"></span>API: <span id="api-state">DISCONNECTED</span>
                | <span id="audio-status">🔇 AUDIO LOCKED</span>
            </div>
        </div>
        
        <div class="panel">
            <label style="font-size:0.7em;">[2. SYNTHESIS]</label>
            <select id="wave-type">
                <option value="triangle">TRIANGLE</option>
                <option value="sine">SINE</option>
                <option value="square">SQUARE</option>
                <option value="sawtooth">SAWTOOTH</option>
            </select>
            <div style="font-size:0.7em;">TEMPO SCALE: <input type="range" id="tempo-scale" min="0.1" max="3.0" step="0.1" value="1.0"></div>
            <div style="font-size:0.7em;">VOLUME: <input type="range" id="master-vol" min="10" max="100" step="1" value="80"></div>
            <div class="stats">
                NOTES: <span id="note-count">0</span> | 
                POLY: <span id="poly-count">0</span> | 
                DUR: <span id="duration">0s</span>
            </div>
        </div>
    </div>

    <div id="console-monitor">> FIXED: Mobile downloads and audio playback</div>
    
    <div class="info-row">
        <span>OSCILLOSCOPE</span>
        <span id="time-display">00:00.00</span>
    </div>
    <canvas id="visualizer"></canvas>
    
    <textarea id="abc-input" rows="8" placeholder="ABC notation..."></textarea>
    
    <div class="control-row">
        <button class="play-btn" onclick="previewMusic()">▶ PREVIEW</button>
        <button class="record-btn" id="record-btn" onclick="toggleRecord()">⏺ RECORD</button>
        <button class="stop-btn" onclick="stopAll()">■ STOP</button>
    </div>
    
    <div class="panel" style="margin-top: 15px;">
        <label style="font-size:0.7em;">[3. EXPORT]</label>
        <div class="dl-group">
            <button class="dl-btn" onclick="exportAudio('webm')">SAVE WEBM</button>
            <button class="dl-btn" onclick="exportAudio('wav')">CONVERT WAV</button>
            <button class="dl-btn" onclick="downloadData('abc')">SAVE ABC</button>
            <button class="dl-btn" onclick="downloadData('midi')">SAVE MIDI</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    
    const NOTE_MAP = {};
    const MIDI_MAP = {};
    
    const bases = [
        ['C', 261.63], ['C#', 277.18], ['Db', 277.18], ['D', 293.66], ['D#', 311.13], ['Eb', 311.13],
        ['E', 329.63], ['F', 349.23], ['F#', 369.99], ['Gb', 369.99], ['G', 392.00], ['G#', 415.30],
        ['Ab', 415.30], ['A', 440.00], ['A#', 466.16], ['Bb', 466.16], ['B', 493.88]
    ];
    
    for (let oct = -2; oct <= 4; oct++) {
        bases.forEach(([name, baseFreq]) => {
            const freq = baseFreq * Math.pow(2, oct);
            const midi = Math.round(69 + 12 * Math.log2(freq / 440));
            const octName = oct < 0 ? ','.repeat(Math.abs(oct)) : oct > 0 ? "'".repeat(oct) : '';
            NOTE_MAP[name + octName] = freq;
            MIDI_MAP[name + octName] = midi;
            if (oct === 0) {
                NOTE_MAP[name.toLowerCase()] = freq * 2;
                MIDI_MAP[name.toLowerCase()] = midi + 12;
            }
        });
    }
    
    NOTE_MAP['z'] = 0; NOTE_MAP['Z'] = 0;

    let audioCtx, masterGain, analyzer;
    let isPlaying = false, isRecording = false;
    let currentSequence = [];
    let recordedChunks = [], mediaRecorder = null;
    let audioUnlocked = false;
    let activeNodes = [];
    let silentAudioNodes = null;
    let recordingDestination = null;
    let pdfDocument = null;
    let pdfPages = [];
    let currentPdfPage = 0;

    function sysLog(msg, isError = false) {
        const mon = document.getElementById('console-monitor');
        const line = document.createElement('div');
        line.textContent = `> ${msg}`;
        if (isError) line.className = 'error-msg';
        mon.appendChild(line);
        mon.scrollTop = mon.scrollHeight;
        console.log(msg);
    }

    async function ensureAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.8;
            analyzer = audioCtx.createAnalyser();
            analyzer.fftSize = 2048;
            masterGain.connect(analyzer);
            analyzer.connect(audioCtx.destination);
            drawVisualizer();
        }
        
        if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }
        
        if (!audioUnlocked) {
            audioUnlocked = true;
            document.getElementById('audio-status').textContent = '🔊 AUDIO READY';
            document.getElementById('audio-status').style.color = '#00ff41';
            sysLog("AUDIO ENGINE UNLOCKED");
        }
    }

    function parseABC(abc) {
        const events = [];
        const lines = abc.split('\n');
        
        let state = {
            defaultLength: 1/8,
            tempo: 120,
            tempoBeatUnit: 0.25,
            key: 'C',
            meter: '4/4',
            accidentals: {},
            inBody: false,
            time: 0
        };
        
        function parseKeySignature(keyStr) {
            const acc = {};
            const keyMatch = keyStr.match(/^([A-G])(#|b)?(m)?/);
            if (!keyMatch) return acc;
            
            const base = keyMatch[1];
            const isMinor = keyMatch[3];
            const sharps = ['F', 'C', 'G', 'D', 'A', 'E', 'B'];
            const flats = ['B', 'E', 'A', 'D', 'G', 'C', 'F'];
            
            let count = 0;
            if (isMinor) {
                const majors = { 'A': 0, 'E': 1, 'B': 2, 'F#': 3, 'C#': 4, 'G#': 5, 'D#': 6, 'A#': 7,
                               'D': -1, 'G': -2, 'C': -3, 'F': -4, 'Bb': -5, 'Eb': -6, 'Ab': -7 };
                count = majors[base + (keyMatch[2] || '')] || 0;
            } else {
                const majors = { 'C': 0, 'G': 1, 'D': 2, 'A': 3, 'E': 4, 'B': 5, 'F#': 6, 'C#': 7,
                               'F': -1, 'Bb': -2, 'Eb': -3, 'Ab': -4, 'Db': -5, 'Gb': -6, 'Cb': -7 };
                count = majors[base + (keyMatch[2] || '')] || 0;
            }
            
            if (count > 0) {
                for (let i = 0; i < count && i < sharps.length; i++) acc[sharps[i]] = '^';
            } else if (count < 0) {
                for (let i = 0; i < Math.abs(count) && i < flats.length; i++) acc[flats[i]] = '_';
            }
            return acc;
        }
        
        lines.forEach(line => {
            const trimmed = line.trim();
            if (!trimmed || trimmed.startsWith('%')) return;
            
            if (trimmed.startsWith('L:')) {
                const match = trimmed.match(/L:(\d+)\/(\d+)/);
                if (match) state.defaultLength = parseInt(match[1]) / parseInt(match[2]);
            }
            else if (trimmed.startsWith('Q:')) {
                const match = trimmed.match(/Q:(?:"[^"]*"\s*)?(?:(\d+)\/(\d+)=)?(\d+)/);
                if (match) {
                    state.tempo = parseInt(match[3]);
                    if (match[1] && match[2]) {
                        state.tempoBeatUnit = parseInt(match[1]) / parseInt(match[2]);
                    }
                }
            }
            else if (trimmed.startsWith('M:')) {
                const match = trimmed.match(/M:(\d+)\/(\d+)/);
                if (match) state.meter = `${match[1]}/${match[2]}`;
            }
            else if (trimmed.startsWith('K:')) {
                const keyMatch = trimmed.match(/K:([A-G][#b]?m?)/);
                if (keyMatch) {
                    state.key = keyMatch[1];
                    state.accidentals = parseKeySignature(state.key);
                    state.inBody = true;
                }
            }
        });
        
        let bodyLines = [];
        
        lines.forEach(line => {
            const trimmed = line.trim();
            if (!trimmed || trimmed.startsWith('%')) return;
            
            if (/^[A-Z]:/.test(trimmed)) {
                if (trimmed.startsWith('V:')) {
                    const inlineMatch = trimmed.match(/\[V:[^\]]+\](.*)/);
                    if (inlineMatch) bodyLines.push(inlineMatch[1].trim());
                }
                return;
            }
            
            if (state.inBody) {
                bodyLines.push(trimmed);
            }
        });
        
        let body = bodyLines.join(' ');
        body = body.replace(/"[^"]*"/g, '');
        body = body.replace(/![^!]*!/g, '');
        body = body.replace(/\{[^\}]*\}/g, '');
        
        const tokens = body.match(/(\[[^\]]*\]|(?:\^|_|=)?[a-gA-G][,']*(?:\d*\/?\d*)?(?:>|&lt;)?|z\d*\/?\d*(?:>|&lt;)?|\(\d+|\)|\|)/g) || [];
        
        let currentAccidentals = {};
        let tripletState = null;
        
        tokens.forEach((token, idx) => {
            if (token === '|') {
                currentAccidentals = {};
                return;
            }
            if (token === ')' || !token.trim()) return;
            
            if (token.startsWith('(') && /^\(\d+$/.test(token)) {
                tripletState = { num: parseInt(token[1]), count: 0, total: parseInt(token[1]) };
                return;
            }
            
            if (token.startsWith('[') && token.endsWith(']')) {
                const inner = token.slice(1, -1).trim();
                const noteTokens = inner.match(/(\^|_|=)?[a-gA-G][,']*\d*\/?\d*/g) || [];
                const notes = [];
                
                noteTokens.forEach(nt => {
                    const parsed = parseNoteToken(nt, state);
                    if (parsed.freq > 0) {
                        notes.push({ note: parsed.note, freq: parsed.freq, duration: parsed.duration });
                    }
                });
                
                if (notes.length > 0) {
                    const maxDur = Math.max(...notes.map(n => n.duration));
                    applyTuplet(notes, tripletState);
                    events.push({
                        type: notes.length > 1 ? 'chord' : 'note',
                        notes: notes,
                        time: state.time,
                        duration: maxDur
                    });
                    state.time += maxDur;
                }
                return;
            }
            
            if (token.startsWith('z') || token.startsWith('Z')) {
                const parsed = parseRestToken(token, state.defaultLength);
                applyTuplet([parsed], tripletState);
                events.push({
                    type: 'rest',
                    time: state.time,
                    duration: parsed.duration
                });
                state.time += parsed.duration;
                return;
            }
            
            const parsed = parseNoteToken(token, state);
            if (parsed.freq > 0) {
                applyTuplet([parsed], tripletState);
                events.push({
                    type: 'note',
                    note: parsed.note,
                    freq: parsed.freq,
                    time: state.time,
                    duration: parsed.duration
                });
                state.time += parsed.duration;
            }
        });
        
        return { 
            events, 
            totalTime: state.time, 
            tempo: state.tempo,
            tempoBeatUnit: state.tempoBeatUnit,
            defaultLength: state.defaultLength,
            key: state.key,
            meter: state.meter
        };
    }

    function parseNoteToken(str, state) {
        if (!str) return { note: 'z', freq: 0, duration: state.defaultLength };
        
        let i = 0;
        let explicitAccidental = '';
        
        if (str[i] === '^' || str[i] === '_' || str[i] === '=') {
            explicitAccidental = str[i];
            i++;
        }
        
        if (i >= str.length) return { note: 'z', freq: 0, duration: state.defaultLength };
        
        let noteLetter = str[i];
        const isUpper = noteLetter === noteLetter.toUpperCase();
        i++;
        
        let octave = '';
        while (i < str.length && (str[i] === ',' || str[i] === "'")) {
            octave += str[i];
            i++;
        }
        
        let octaveShift = 0;
        if (!isUpper) octaveShift = 1;
        
        const commas = (octave.match(/,/g) || []).length;
        const apos = (octave.match(/'/g) || []).length;
        octaveShift += apos - commas;
        
        let noteName = noteLetter.toUpperCase();
        
        let accidental = '';
        if (explicitAccidental) {
            accidental = explicitAccidental;
        } else if (state.accidentals[noteName]) {
            accidental = state.accidentals[noteName];
        }
        
        const accMap = { '^': '#', '_': 'b', '=': '' };
        const fullNote = accidental + noteName + accMap[accidental] + "'".repeat(Math.max(0, octaveShift)) + ",".repeat(Math.max(0, -octaveShift));
        
        let duration = state.defaultLength;
        const durStr = str.substring(i);
        
        if (durStr.includes('>')) {
            const count = (durStr.match(/>/g) || []).length;
            duration = state.defaultLength * (1 + 0.5 * count);
        } else if (durStr.includes('<')) {
            const count = (durStr.match(/</g) || []).length;
            duration = state.defaultLength / Math.pow(2, count);
        } else if (durStr) {
            if (durStr.includes('/')) {
                const parts = durStr.split('/');
                duration = (parseInt(parts[0]) || 1) / (parseInt(parts[1]) || 2) * state.defaultLength;
            } else {
                const num = parseInt(durStr);
                if (num) duration = num * state.defaultLength;
            }
        }
        
        let freq = 0;
        const attempts = [
            accidental + noteName + accMap[accidental] + "'".repeat(Math.max(0, octaveShift)) + ",".repeat(Math.max(0, -octaveShift)),
            noteName + accMap[accidental] + "'".repeat(Math.max(0, octaveShift)) + ",".repeat(Math.max(0, -octaveShift)),
            accidental + noteName + "'".repeat(Math.max(0, octaveShift)) + ",".repeat(Math.max(0, -octaveShift)),
            noteName + "'".repeat(Math.max(0, octaveShift)) + ",".repeat(Math.max(0, -octaveShift))
        ];
        
        for (const attempt of attempts) {
            if (NOTE_MAP[attempt]) {
                freq = NOTE_MAP[attempt];
                break;
            }
        }
        
        return { note: fullNote, freq, duration };
    }

    function parseRestToken(str, defaultLen) {
        let duration = defaultLen;
        const durStr = str.substring(1);
        
        if (durStr.includes('>')) {
            const count = (durStr.match(/>/g) || []).length;
            duration = defaultLen * (1 + 0.5 * count);
        } else if (durStr.includes('<')) {
            const count = (durStr.match(/</g) || []).length;
            duration = defaultLen / Math.pow(2, count);
        } else if (durStr) {
            if (durStr.includes('/')) {
                const parts = durStr.split('/');
                duration = (parseInt(parts[0]) || 1) / (parseInt(parts[1]) || 2) * defaultLen;
            } else {
                const num = parseInt(durStr);
                if (num) duration = num * defaultLen;
            }
        }
        
        return { note: 'z', freq: 0, duration };
    }

    function applyTuplet(notes, tripletState) {
        if (!tripletState) return;
        if (tripletState.num === 3) {
            notes.forEach(n => n.duration *= 2/3);
        } else if (tripletState.num === 2) {
            notes.forEach(n => n.duration *= 3/2);
        }
        tripletState.count++;
        if (tripletState.count >= tripletState.total) tripletState = null;
    }

    async function previewMusic() {
        await ensureAudio();
        playSequence(false);
    }

    async function toggleRecord() {
        await ensureAudio();
        
        if (isRecording) {
            stopRecording();
            return;
        }

        startRecording();
    }

    function startRecording() {
        const mimeTypes = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus'];
        let selectedMime = null;
        for (const type of mimeTypes) {
            if (MediaRecorder.isTypeSupported(type)) {
                selectedMime = type;
                break;
            }
        }
        
        if (!selectedMime) {
            sysLog("Recording not supported", true);
            return;
        }

        recordingDestination = audioCtx.createMediaStreamDestination();
        masterGain.connect(recordingDestination);
        
        const silentOsc = audioCtx.createOscillator();
        const silentGain = audioCtx.createGain();
        silentGain.gain.value = 0.001;
        silentOsc.connect(silentGain);
        silentGain.connect(recordingDestination);
        silentOsc.start();
        
        silentAudioNodes = { osc: silentOsc, gain: silentGain };
        
        try {
            mediaRecorder = new MediaRecorder(recordingDestination.stream, {
                mimeType: selectedMime,
                audioBitsPerSecond: 256000
            });
        } catch(e) {
            sysLog("MediaRecorder failed: " + e.message, true);
            cleanupRecording();
            return;
        }

        recordedChunks = [];
        
        mediaRecorder.ondataavailable = (e) => {
            if (e.data && e.data.size > 0) recordedChunks.push(e.data);
        };
        
        mediaRecorder.onstop = () => {
            finalizeRecording();
        };

        mediaRecorder.onerror = (e) => {
            sysLog("Recording error", true);
            cleanupRecording();
        };

        mediaRecorder.start(100);
        isRecording = true;
        document.getElementById('record-btn').classList.add('recording');
        document.getElementById('record-btn').textContent = '⏹ STOP';
        sysLog("🔴 RECORDING");
        
        playSequence(true);
    }

    function stopRecording() {
        if (!mediaRecorder) return;
        
        if (mediaRecorder.state === "recording") {
            mediaRecorder.requestData();
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                }
            }, 300);
        }
        
        isRecording = false;
        document.getElementById('record-btn').classList.remove('recording');
        document.getElementById('record-btn').textContent = '⏺ RECORD';
    }

    function finalizeRecording() {
        if (silentAudioNodes) {
            silentAudioNodes.osc.stop();
            silentAudioNodes.gain.disconnect();
            silentAudioNodes = null;
        }
        
        if (recordingDestination) {
            masterGain.disconnect(recordingDestination);
            recordingDestination = null;
        }
        
        if (recordedChunks.length === 0) {
            sysLog("No audio data recorded", true);
            return;
        }
        
        const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
        window.lastRecording = blob;
        
        const ext = blob.type.includes('ogg') ? 'ogg' : 'webm';
        const sizeKB = (blob.size / 1024).toFixed(1);
        
        sysLog(`💾 RECORDED: ${ext.toUpperCase()} (${sizeKB}KB)`);
        
        // Use downloadBlob for mobile compatibility
        downloadBlob(blob, `polychip_${Date.now()}.${ext}`);
    }

    function cleanupRecording() {
        if (silentAudioNodes) {
            try { silentAudioNodes.osc.stop(); } catch(e) {}
            try { silentAudioNodes.gain.disconnect(); } catch(e) {}
            silentAudioNodes = null;
        }
        if (recordingDestination) {
            try { masterGain.disconnect(recordingDestination); } catch(e) {}
            recordingDestination = null;
        }
        isRecording = false;
        document.getElementById('record-btn').classList.remove('recording');
        document.getElementById('record-btn').textContent = '⏺ RECORD';
    }

    // ============================================
    // FIXED AUDIO PLAYBACK - Ensure nodes stay alive
    // ============================================
    function playSequence(isForRecording = false) {
        stopAll();
        
        const raw = document.getElementById('abc-input').value;
        if (!raw.trim()) {
            sysLog("No ABC data", true);
            return;
        }

        const result = parseABC(raw);
        if (result.events.length === 0) {
            sysLog("No playable notes", true);
            return;
        }

        currentSequence = result.events;
        
        const tempoScale = parseFloat(document.getElementById('tempo-scale').value) || 1.0;
        const volume = (parseFloat(document.getElementById('master-vol').value) || 80) / 100;
        const waveType = document.getElementById('wave-type').value || 'triangle';
        
        const bpm = result.tempo;
        const beatUnit = result.tempoBeatUnit || 0.25;
        const unitLength = result.defaultLength;
        
        const secondsPerUnit = (60.0 / bpm) * (beatUnit / unitLength);
        const timeMultiplier = secondsPerUnit / tempoScale;
        
        sysLog(`=== TEMPO ===`);
        sysLog(`BPM: ${bpm}, Beat: ${beatUnit}, Unit: ${unitLength}`);
        sysLog(`Seconds/unit: ${secondsPerUnit.toFixed(4)}, Multiplier: ${timeMultiplier.toFixed(4)}`);
        
        const now = audioCtx.currentTime;
        const startTime = now + 0.1;
        
        let maxPoly = 0, noteCount = 0;
        let actualTotalTime = 0;
        
        // Log first event for debugging
        if (result.events.length > 0) {
            const first = result.events[0];
            sysLog(`First event: ${first.type} at ${first.time} units, dur ${first.duration} units`);
        }
        
        result.events.forEach((event, idx) => {
            const eventTime = event.time * timeMultiplier;
            const duration = event.duration * timeMultiplier;
            
            if (event.type === 'rest') {
                actualTotalTime = Math.max(actualTotalTime, eventTime + duration);
                return;
            }
            
            const notes = event.notes || [{note: event.note, freq: event.freq}];
            maxPoly = Math.max(maxPoly, notes.length);
            noteCount += notes.length;
            
            actualTotalTime = Math.max(actualTotalTime, eventTime + duration);
            
            const eventStart = startTime + eventTime;
            
            notes.forEach((noteData, noteIdx) => {
                const freq = noteData.freq;
                if (!freq || freq <= 0) {
                    console.warn(`Invalid freq for note ${noteData.note}`);
                    return;
                }
                
                try {
                    const osc = audioCtx.createOscillator();
                    const noteGain = audioCtx.createGain();
                    
                    osc.type = waveType;
                    
                    // Set frequency at exact start time
                    osc.frequency.setValueAtTime(freq, eventStart);
                    
                    // Simpler envelope - avoid exponential issues
                    const attack = 0.01;
                    const sustain = (0.3 * volume) / Math.sqrt(notes.length);
                    const release = Math.min(0.05, duration * 0.2);
                    
                    // Use linear ramps exclusively to avoid exponential edge cases
                    noteGain.gain.setValueAtTime(0, eventStart);
                    noteGain.gain.linearRampToValueAtTime(sustain, eventStart + attack);
                    noteGain.gain.linearRampToValueAtTime(sustain * 0.8, eventStart + duration - release);
                    noteGain.gain.linearRampToValueAtTime(0.001, eventStart + duration);
                    
                    osc.connect(noteGain);
                    noteGain.connect(masterGain);
                    
                    // CRITICAL: Start and stop with explicit times
                    osc.start(eventStart);
                    osc.stop(eventStart + duration + 0.05);
                    
                    // Keep references for emergency stop
                    activeNodes.push(osc, noteGain);
                    
                    // Debug first few notes
                    if (idx < 2 && noteIdx === 0) {
                        console.log(`Note ${noteData.note} (${freq.toFixed(1)}Hz) at ${eventStart.toFixed(3)}s for ${duration.toFixed(3)}s`);
                    }
                    
                } catch(e) {
                    console.error("Audio node error:", e);
                }
            });
        });

        isPlaying = true;
        document.getElementById('note-count').textContent = noteCount;
        document.getElementById('poly-count').textContent = maxPoly;
        document.getElementById('duration').textContent = actualTotalTime.toFixed(1) + 's';
        
        sysLog(`PLAYBACK: ${noteCount} notes, ${actualTotalTime.toFixed(1)}s`);
        
        // Auto-stop with buffer
        const stopDelay = (actualTotalTime + 0.5) * 1000;
        setTimeout(() => {
            if (isPlaying) {
                stopAll();
                if (isForRecording && isRecording) {
                    stopRecording();
                }
            }
        }, stopDelay);
    }

    function stopAll() {
        isPlaying = false;
        const now = audioCtx ? audioCtx.currentTime : 0;
        
        // Stop all active nodes immediately
        activeNodes.forEach(node => {
            try {
                if (node.stop && node.context) {
                    // Only stop if not already stopped
                    node.stop(now);
                }
                if (node.disconnect) {
                    node.disconnect();
                }
            } catch(e) {
                // Ignore errors from already-stopped nodes
            }
        });
        activeNodes = [];
        
        if (!isRecording) {
            document.getElementById('poly-count').textContent = '0';
        }
        
        sysLog("⏹ STOPPED");
    }

    // ============================================
    // FIXED DOWNLOADS - Mobile-compatible blob downloads
    // ============================================
    function downloadBlob(blob, filename) {
        // Create object URL
        const url = URL.createObjectURL(blob);
        
        // Method 1: Try anchor download
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.style.display = 'none';
        document.body.appendChild(a);
        
        // Trigger click
        const clickEvent = new MouseEvent('click', {
            bubbles: true,
            cancelable: true,
            view: window
        });
        a.dispatchEvent(clickEvent);
        
        // Cleanup
        setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }, 100);
        
        sysLog(`📥 DOWNLOAD: ${filename}`);
    }

    async function exportAudio(format) {
        if (!window.lastRecording) {
            sysLog("No recording available. Use RECORD first.", true);
            return;
        }
        
        if (format === 'webm') {
            downloadBlob(window.lastRecording, `polychip_${Date.now()}.webm`);
            return;
        }
        
        if (format === 'wav') {
            sysLog("Converting to WAV...");
            try {
                const arrayBuffer = await window.lastRecording.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                const wavBlob = audioBufferToWav(audioBuffer);
                downloadBlob(wavBlob, `polychip_${Date.now()}.wav`);
                sysLog("💾 WAV converted");
            } catch(e) {
                sysLog("WAV conversion failed: " + e.message, true);
            }
        }
    }

    function audioBufferToWav(buffer) {
        const length = buffer.length * buffer.numberOfChannels * 2 + 44;
        const arrayBuffer = new ArrayBuffer(length);
        const view = new DataView(arrayBuffer);
        let pos = 0;

        function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }
        function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }

        setUint32(0x46464952);
        setUint32(length - 8);
        setUint32(0x45564157);
        setUint32(0x20746d66);
        setUint32(16);
        setUint16(1);
        setUint16(buffer.numberOfChannels);
        setUint32(buffer.sampleRate);
        setUint32(buffer.sampleRate * 2 * buffer.numberOfChannels);
        setUint16(buffer.numberOfChannels * 2);
        setUint16(16);
        setUint32(0x61746164);
        setUint32(length - pos - 4);

        for (let i = 0; i < buffer.length; i++) {
            for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
                const sample = Math.max(-1, Math.min(1, buffer.getChannelData(ch)[i]));
                view.setInt16(pos, sample < 0 ? sample * 32768 : sample * 32767, true);
                pos += 2;
            }
        }
        return new Blob([arrayBuffer], { type: "audio/wav" });
    }

    function downloadData(type) {
        const val = document.getElementById('abc-input').value;
        if (!val) { sysLog("Buffer empty", true); return; }
        
        let blob, ext;
        if (type === 'abc') {
            blob = new Blob([val], {type: 'text/plain'});
            ext = 'abc';
        } else if (type === 'midi') {
            const result = parseABC(val);
            const midiData = generateSMF(result);
            blob = new Blob([midiData], {type: 'audio/midi'});
            ext = 'mid';
        }
        
        downloadBlob(blob, `polychip_${Date.now()}.${ext}`);
        sysLog(`💾 SAVED: .${ext.toUpperCase()}`);
    }

    function generateSMF(result) {
        const ticksPerBeat = 480;
        const mpb = Math.floor(60000000 / result.tempo);
        
        const header = [0x4D, 0x54, 0x68, 0x64, 0x00, 0x00, 0x00, 0x06, 0x00, 0x01, 0x00, 0x02,
                       (ticksPerBeat >> 8) & 0xFF, ticksPerBeat & 0xFF];
        
        const metaTrack = [0x00, 0xFF, 0x58, 0x04, 0x04, 0x02, 0x18, 0x08,
                          0x00, 0xFF, 0x51, 0x03, (mpb >> 16) & 0xFF, (mpb >> 8) & 0xFF, mpb & 0xFF,
                          0x00, 0xFF, 0x2F, 0x00];
        
        const metaChunk = [0x4D, 0x54, 0x72, 0x6B, 0x00, 0x00, 0x00, metaTrack.length, ...metaTrack];
        
        const noteTrack = [0x00, 0xC0, 0x50];
        let currentTick = 0;
        
        result.events.forEach(event => {
            const tick = Math.floor(event.time * ticksPerBeat / result.defaultLength);
            const dur = Math.floor(event.duration * ticksPerBeat / result.defaultLength);
            const delta = tick - currentTick;
            
            if (event.type === 'rest') {
                currentTick = tick;
                return;
            }
            
            const notes = event.notes || [{note: event.note}];
            
            notes.forEach((n, i) => {
                const midi = MIDI_MAP[n.note] || MIDI_MAP[n.note.replace(/[#b]/, '')];
                if (!midi) return;
                writeVarLen(noteTrack, i === 0 ? delta : 0);
                noteTrack.push(0x90, midi, 0x50);
            });
            
            notes.forEach((n, i) => {
                const midi = MIDI_MAP[n.note] || MIDI_MAP[n.note.replace(/[#b]/, '')];
                if (!midi) return;
                writeVarLen(noteTrack, i === 0 ? dur : 0);
                noteTrack.push(0x80, midi, 0x00);
            });
            
            currentTick = tick + dur;
        });
        
        noteTrack.push(0x00, 0xFF, 0x2F, 0x00);
        
        const noteChunk = [0x4D, 0x54, 0x72, 0x6B,
                          (noteTrack.length >> 24) & 0xFF, (noteTrack.length >> 16) & 0xFF,
                          (noteTrack.length >> 8) & 0xFF, noteTrack.length & 0xFF,
                          ...noteTrack];
        
        return new Uint8Array([...header, ...metaChunk, ...noteChunk]);
    }

    function writeVarLen(arr, val) {
        if (val === 0) { arr.push(0); return; }
        const bytes = [];
        let v = val;
        do { bytes.unshift((v & 0x7F) | 0x80); v >>= 7; } while (v > 0);
        bytes[bytes.length - 1] &= 0x7F;
        arr.push(...bytes);
    }

    function drawVisualizer() {
        if (!analyzer) return;
        requestAnimationFrame(drawVisualizer);
        
        const canvas = document.getElementById('visualizer');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const data = new Uint8Array(analyzer.frequencyBinCount);
        analyzer.getByteTimeDomainData(data);
        
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = isPlaying ? '#00ff41' : '#004411';
        ctx.lineWidth = 2;
        ctx.beginPath();
        
        const slice = canvas.width / data.length;
        for (let i = 0; i < data.length; i++) {
            const y = (data[i] / 128) * canvas.height / 2;
            if (i === 0) ctx.moveTo(0, y);
            else ctx.lineTo(i * slice, y);
        }
        ctx.stroke();
        
        if (audioCtx) {
            const t = audioCtx.currentTime;
            const m = Math.floor(t / 60).toString().padStart(2, '0');
            const s = Math.floor(t % 60).toString().padStart(2, '0');
            const ms = Math.floor((t % 1) * 100).toString().padStart(2, '0');
            document.getElementById('time-display').textContent = `${m}:${s}.${ms}`;
        }
    }

    async function renderPDFPage(pageNum, scale = 2.0) {
        if (!pdfDocument) return null;
        
        const page = await pdfDocument.getPage(pageNum);
        const viewport = page.getViewport({ scale });
        
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        
        await page.render({
            canvasContext: context,
            viewport: viewport
        }).promise;
        
        return canvas.toDataURL('image/png');
    }

    async function processPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        pdfDocument = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        
        const numPages = pdfDocument.numPages;
        sysLog(`PDF loaded: ${numPages} pages`);
        
        const pageContainer = document.getElementById('pdf-pages');
        pageContainer.innerHTML = '';
        pageContainer.style.display = 'flex';
        
        pdfPages = [];
        
        for (let i = 1; i <= numPages; i++) {
            const btn = document.createElement('button');
            btn.className = 'page-btn';
            btn.textContent = `P${i}`;
            btn.onclick = () => selectPDFPage(i);
            pageContainer.appendChild(btn);
            pdfPages.push({ processed: false, data: null });
        }
        
        selectPDFPage(1);
    }

    async function selectPDFPage(pageNum) {
        currentPdfPage = pageNum;
        
        document.querySelectorAll('.page-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', idx === pageNum - 1);
        });
        
        sysLog(`Selected page ${pageNum}`);
        
        if (!pdfPages[pageNum - 1].data) {
            sysLog(`Rendering page ${pageNum}...`);
            const dataUrl = await renderPDFPage(pageNum);
            pdfPages[pageNum - 1].data = dataUrl;
            pdfPages[pageNum - 1].processed = true;
            document.querySelectorAll('.page-btn')[pageNum - 1].classList.add('processed');
        }
    }

    async function startWorkflow() {
        const key = document.getElementById('api-key').value.trim();
        const file = document.getElementById('file-input').files[0];
        const btn = document.getElementById('process-btn');
        
        if(!key) { sysLog("ENTER API KEY", true); return; }
        if(!file) { sysLog("SELECT FILE", true); return; }
        
        const isPDF = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
        
        if(!isPDF && file.size > 4 * 1024 * 1024) { 
            sysLog("FILE TOO LARGE", true); 
            return; 
        }

        btn.disabled = true;
        document.getElementById('p-cont').style.display = 'block';
        updateProgress(10);

        try {
            if (isPDF && !pdfPages[currentPdfPage - 1]?.data) {
                sysLog("Processing PDF...");
                await processPDF(file);
            }
            
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${key}`);
            const data = await res.json();
            if (!data.models) throw new Error("Invalid API key");
            
            const model = data.models.find(m => m.name.includes("flash"))?.name.split('/').pop() || data.models[0].name.split('/').pop();
            document.getElementById('api-status').classList.add('status-active');
            document.getElementById('api-state').textContent = 'LINKED';
            updateProgress(30);

            let b64;
            if (isPDF) {
                const dataUrl = pdfPages[currentPdfPage - 1].data;
                b64 = dataUrl.split(',')[1];
            } else {
                const reader = new FileReader();
                b64 = await new Promise((resolve, reject) => {
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }
            
            updateProgress(60);
            
            const prompt = `Analyze this sheet music and output ABC notation.
Format: X:1 T:Title M:4/4 L:1/8 Q:120 K:C
Notes: C, D, E (low), C D E (mid), c d e (high), c' d' e' (higher)
Chords in [] like [CEG], rests as z. Output ONLY ABC notation.`;
            
            const genRes = await fetch(
                `https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${key}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ 
                            parts: [{ text: prompt }, { inline_data: { mime_type: 'image/png', data: b64 }}]
                        }]
                    })
                }
            );
            
            const genData = await genRes.json();
            updateProgress(90);
            
            if (genData.error) throw new Error(genData.error.message);
            
            let abcText = genData.candidates[0].content.parts[0].text;
            abcText = abcText.replace(/```[a-z]*\n?/gi, '').replace(/```/g, '').trim();
            
            const currentVal = document.getElementById('abc-input').value;
            if (currentVal && !currentVal.endsWith('\n\n')) {
                document.getElementById('abc-input').value = currentVal + '\n\n' + abcText;
            } else {
                document.getElementById('abc-input').value = currentVal + abcText;
            }
            
            updateProgress(100);
            
            const result = parseABC(abcText);
            if (result.events.length > 0) {
                currentSequence = result.events;
                document.getElementById('note-count').textContent = result.events.filter(e => e.type !== 'rest').length;
                document.getElementById('duration').textContent = result.totalTime.toFixed(1) + 's';
                sysLog(`TRANSCRIBED PAGE ${currentPdfPage}: ${result.events.length} events`);
            }
                    
        } catch(e) { 
            sysLog("ERROR: " + e.message, true);
        } finally {
            setTimeout(() => {
                document.getElementById('p-cont').style.display = 'none';
                btn.disabled = false;
            }, 500);
        }
    }

    function updateProgress(percent) {
        document.getElementById('progress-bar').style.width = percent + '%';
    }

    function loadDemo() {
        const demoABC = `X:1
T:Tempo Test - 120 BPM
M:4/4
L:1/4
Q:120
K:C
C C C C | C C C C |]`;
        
        document.getElementById('abc-input').value = demoABC;
        sysLog("DEMO: 8 quarter notes at 120 BPM = 4 seconds");
        
        const result = parseABC(demoABC);
        if (result.events.length > 0) {
            currentSequence = result.events;
            document.getElementById('note-count').textContent = result.events.filter(e => e.type !== 'rest').length;
        }
    }

    window.addEventListener('load', () => {
        const c = document.getElementById('visualizer');
        if (c) { c.width = c.offsetWidth; c.height = c.offsetHeight; }
        sysLog("v9.1 READY - Fixed downloads & audio");
    });

    window.addEventListener('resize', () => {
        const c = document.getElementById('visualizer');
        if (c) { c.width = c.offsetWidth; c.height = c.offsetHeight; }
    });
