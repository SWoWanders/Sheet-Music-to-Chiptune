<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chiptune System v2.2 - Polyphonic Master</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; --dim: #004411; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .terminal { width: 95%; max-width: 900px; border: 2px solid var(--neon); padding: 20px; background: #000; box-shadow: 0 0 20px rgba(0,255,65,0.3); }
        h1 { text-align: center; border-bottom: 2px solid var(--neon); padding-bottom: 10px; text-shadow: 0 0 8px var(--neon); margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel { border: 1px solid var(--dim); padding: 15px; background: #050505; }
        input, textarea { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; font-family: inherit; width: 100%; box-sizing: border-box; }
        label { font-size: 0.7em; color: #888; text-transform: uppercase; margin-bottom: 5px; display: block; }
        canvas { width: 100%; height: 100px; background: #000; border: 1px solid var(--dim); margin: 10px 0; }
        .slider-group { margin: 10px 0; }
        .slider-group div { display: flex; justify-content: space-between; font-size: 0.7em; margin-bottom: 3px; }
        button { background: var(--neon); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        #stop-btn { background: #ff3333; color: white; }
        #download-link { display: none; color: #fff; text-align: center; font-weight: bold; padding: 15px; border: 1px solid #fff; margin-top: 10px; text-decoration: none; }
        .status { font-size: 0.7em; text-align: center; margin-top: 10px; color: var(--neon); border-top: 1px solid var(--dim); padding-top: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>CHIPTUNE_CORE_v2.2</h1>
    <div class="grid">
        <div class="panel">
            <label>1. AUTH & SOURCE</label>
            <input type="text" id="api-key" placeholder="Gemini API Key...">
            <input type="file" id="file-input" style="margin-top:10px;">
            <button onclick="analyzeWithPrecision()">RUN_ANALYSIS</button>
        </div>
        <div class="panel">
            <label>2. MODULATION_RACK</label>
            <div class="slider-group">
                <div><span>TEMPO</span><span id="t-val">1.0x</span></div>
                <input type="range" id="tempo-scale" min="0.2" max="3.0" step="0.1" value="1.0" oninput="document.getElementById('t-val').innerText=this.value+'x'">
            </div>
            <div class="slider-group">
                <div><span>PITCH</span><span id="p-val">1.0x</span></div>
                <input type="range" id="pitch-scale" min="0.5" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('p-val').innerText=this.value+'x'">
            </div>
            <div class="slider-group">
                <div><span>VIBRATO</span><span id="v-val">0</span></div>
                <input type="range" id="vibrato-depth" min="0" max="20" step="1" value="0" oninput="document.getElementById('v-val').innerText=this.value">
            </div>
        </div>
    </div>

    <label>3. SIGNAL_ANALYZER & DATA_BUFFER</label>
    <canvas id="visualizer"></canvas>
    <textarea id="abc-input" rows="8" placeholder="Awaiting verified ABC notation..."></textarea>

    <div style="display:flex; gap:10px; margin-top:15px;">
        <button onclick="playAndRecord()" style="flex:2;">▶ RENDER_CHORDS_AND_PLAY</button>
        <button id="stop-btn" onclick="stopAll()" style="flex:1;">■ STOP</button>
    </div>
    
    <a id="download-link">DOWNLOAD_MASTER_RENDER</a>
    <div class="status" id="status-msg">SYSTEM_READY // CHORD_EXPLODER_ACTIVE</div>
</div>
