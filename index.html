<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHIPTUNE_CORE_v4.1</title>
    <script src="https://cdn.jsdelivr.net/npm/midi-writer-js@2.1.4/browser/index.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; --dim: #004411; --err: #ff3333; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .terminal { width: 98%; max-width: 900px; border: 2px solid var(--neon); padding: 15px; background: #000; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        .panel { border: 1px solid var(--dim); padding: 12px; background: #050505; }
        input, select, textarea { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        #console-monitor { width: 100%; height: 100px; background: #001100; border: 1px solid var(--dim); color: #00ff00; font-size: 11px; overflow-y: auto; padding: 5px; margin-top: 10px; white-space: pre-wrap; }
        button { background: var(--neon); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        canvas { width: 100%; height: 60px; background: #000; border: 1px solid var(--dim); margin-top: 10px; }
        .download-btn { display: inline-block; margin: 10px 5px; color: var(--neon); text-decoration: none; border: 1px solid var(--neon); padding: 8px 15px; font-size: 0.8em; background: rgba(0,255,65,0.1); }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="text-align:center; margin: 0 0 10px 0;">CHIPTUNE_CORE_v4.1</h2>
    <div class="grid">
        <div class="panel">
            <label style="font-size:0.7em;">1. IMAGE TO MUSIC SOURCE</label>
            <input type="password" id="api-key" placeholder="Paste Gemini API Key...">
            <input type="file" id="file-input" accept="image/*">
            <button id="btn-transcribe" onclick="runAnalysis()">RUN_TRANSCRIPTION</button>
        </div>
        <div class="panel">
            <label style="font-size:0.7em;">2. MODULATION & PRESETS</label>
            <select id="wave-type">
                <option value="sawtooth">GRITTY SAWTOOTH (Tom Waits Style)</option>
                <option value="square">CLASSIC SQUARE (8-Bit NES)</option>
                <option value="triangle">TRIANGLE (Deep/Bass)</option>
                <option value="sine">PURE SINE (Whistle)</option>
            </select>
            <div style="font-size:0.7em;">TEMPO: <input type="range" id="tempo-scale" min="0.2" max="3.0" step="0.1" value="1.0"></div>
            <div style="font-size:0.7em;">VIBRATO: <input type="range" id="vibrato-depth" min="0" max="50" step="1" value="15"></div>
        </div>
    </div>

    <div id="console-monitor">SYSTEM_READY...</div>
    <canvas id="visualizer"></canvas>
    <textarea id="abc-input" rows="5" placeholder="ABC buffer..."></textarea>

    <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="playAndRecord()" style="flex:2; background:#00ff41;">▶ PLAY & RECORD ALL</button>
        <button onclick="stopAll()" style="background:var(--err); color:white; flex:1;">■ STOP</button>
    </div>
    <div id="download-zone" style="text-align:center;"></div>
</div>

<script>
    const noteMap = { "C": 261.63, "^C": 277.18, "_D": 277.18, "D": 293.66, "^D": 311.13, "_E": 311.13, "E": 329.63, "F": 349.23, "^F": 369.99, "_G": 369.99, "G": 392.00, "^G": 415.30, "_A": 415.30, "A": 440.00, "^A": 466.16, "_B": 466.16, "B": 493.88, "z": 0 };
    let audioCtx = null, activeSources = [], recorder = null, audioChunks = [], analyzer = null;

    function sysLog(msg) {
        const mon = document.getElementById('console-monitor');
        mon.innerHTML += `\n[${new Date().toLocaleTimeString()}] >> ${msg}`;
        mon.scrollTop = mon.scrollHeight;
    }

    async function runAnalysis() {
        const btn = document.getElementById('btn-transcribe');
        const key = document.getElementById('api-key').value.trim();
        const file = document.getElementById('file-input').files[0];

        if(!key) return sysLog("CRITICAL: API Key is missing.");
        if(!file) return sysLog("CRITICAL: No image file selected.");

        btn.disabled = true;
        sysLog("INITIATING: Reading file stream...");

        const reader = new FileReader();
        reader.onerror = () => { sysLog("FILE ERROR: Could not read image."); btn.disabled = false; };
        reader.readAsDataURL(file);
        
        reader.onload = async () => {
            const b64 = reader.result.split(',')[1];
            sysLog("CONNECTING: Sending data to Gemini-1.5-Flash...");
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [
                        { text: "Output raw ABC notation ONLY. Use [V:1] and [V:2] for separate voices. Use [brackets] for chords. NO markdown code blocks." },
                        { inline_data: { mime_type: file.type, data: b64 } }
                    ]}] })
                });

                const data = await res.json();
                if(data.error) throw new Error(data.error.message);
                
                if(!data.candidates || !data.candidates[0].content.parts[0].text) {
                    throw new Error("Empty response from AI model.");
                }

                const abc = data.candidates[0].content.parts[0].text.replace(/```abc|```/g, '').trim();
                document.getElementById('abc-input').value = abc;
                sysLog("SUCCESS: Music transcribed.");
            } catch(e) {
                sysLog("FAILED: " + e.message);
            } finally {
                btn.disabled = false;
            }
        };
    }

    // Audio Engine Core (Restored and Locked)
    function scheduleNote(f, t, d, type, vol, dest, v) {
        if(f <= 0) return;
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(f, t);
        if (v > 0) {
            const lfo = audioCtx.createOscillator(), lg = audioCtx.createGain();
            lfo.frequency.setValueAtTime(6, t); lg.gain.setValueAtTime(v, t);
            lfo.connect(lg); lg.connect(osc.frequency);
            lfo.start(t); lfo.stop(t+d); activeSources.push(lfo);
        }
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol, t + 0.02);
        g.gain.linearRampToValueAtTime(0, t + d);
        osc.
