<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chiptune System v1.2</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; --dim: #004411; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .terminal { width: 95%; max-width: 900px; border: 2px solid var(--neon); padding: 20px; background: #000; box-shadow: 0 0 20px rgba(0,255,65,0.3); }
        h1 { text-align: center; border-bottom: 2px solid var(--neon); padding-bottom: 10px; text-shadow: 0 0 8px var(--neon); margin-top: 0; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel { border: 1px solid var(--dim); padding: 15px; background: #050505; }
        
        input, select, textarea { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; font-family: inherit; outline: none; width: 100%; box-sizing: border-box; }
        label { font-size: 0.8em; text-transform: uppercase; margin-bottom: 5px; display: block; color: #888; }

        /* Progress Bar */
        .progress-container { width: 100%; background: var(--dim); height: 12px; margin: 10px 0; display: none; border-radius: 2px; border: 1px solid var(--neon); overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--neon); transition: width 0.4s ease; box-shadow: 0 0 10px var(--neon); }

        .controls { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        button { background: var(--neon); color: #000; border: none; padding: 12px 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; flex: 1; transition: 0.2s; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        button:disabled { background: var(--dim); color: #000; cursor: not-allowed; }
        
        #stop-btn { background: #ff3333; color: white; flex: 0.4; }
        #download-link { display: none; color: #fff; text-align: center; font-weight: bold; padding: 15px; border: 1px solid #fff; margin-top: 10px; text-decoration: none; background: #222; }
        .status { font-size: 0.8em; text-align: center; color: #888; margin-top: 10px; font-style: italic; }
        
        .slider-group { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .slider-group span { min-width: 60px; font-size: 0.8em; }
        input[type="range"] { accent-color: var(--neon); cursor: pointer; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>CHIPTUNE_CORE_v1.2</h1>

    <div class="grid">
        <div class="panel">
            <label>1. AUTH & SOURCE</label>
            <input type="text" id="api-key" placeholder="Gemini API Key...">
            
            <label style="margin-top:15px;">2. SHEET MUSIC IMAGE</label>
            <input type="file" id="file-input" accept="image/*">
            <button onclick="analyzeImage()" id="analyze-btn" style="margin-top:10px;">RUN_ANALYSIS</button>
            
            <div class="progress-container" id="prog-parent">
                <div id="progress-bar"></div>
            </div>
        </div>

        <div class="panel">
            <label>3. SIGNAL SCALING</label>
            <div class="slider-group">
                <span>TEMPO</span>
                <input type="range" id="tempo-scale" min="0.2" max="2.5" step="0.1" value="1.0">
            </div>
            <div class="slider-group">
                <span>PITCH</span>
                <input type="range" id="pitch-scale" min="0.5" max="2.0" step="0.1" value="1.0">
            </div>

            <label style="margin-top:10px;">4. EXPORT FORMAT</label>
            <select id="export-format">
                <option value="audio/webm">WEBM (Native)</option>
                <option value="audio/ogg">OGG (Compressed)</option>
                <option value="audio/wav">WAV (Raw)</option>
            </select>
        </div>
    </div>

    <label>ABC_DATA_BUFFER</label>
    <textarea id="abc-input" placeholder="Awaiting signal transcription..."></textarea>

    <div class="controls">
        <button onclick="playAndRecord()">▶ PLAY & RECORD</button>
        <button id="stop-btn" onclick="stopAll()">■ STOP</button>
    </div>

    <a id="download-link">INITIATE_DOWNLOAD</a>
    <div class="status" id="status-msg">SYSTEM_READY // TARGET: gemini-2.5-flash</div>
</div>

<script>
    const noteFrequencies = {
        "z": 0, "Z": 0,
        "C,,": 65.41, "D,,": 73.42, "E,,": 82.41, "F,,": 87.31, "G,,": 98.00, "A,,": 110.00, "B,,": 123.47,
        "C,": 130.81, "D,": 146.83, "E,": 164.81, "F,": 174.61, "G,": 196.00, "A,": 220.00, "B,": 246.94,
        "C": 261.63, "D": 293.66, "E": 329.63, "F": 349.23, "G": 392.00, "A": 440.00, "B": 493.88,
        "c": 523.25, "d": 587.33, "e": 659.25, "f": 698.46, "g": 783.99
    };

    let audioCtx = null;
    let activeSources = [];
    let recorder = null;
    let audioChunks = [];

    async function analyzeImage() {
        const apiKey = document.getElementById('api-key').value;
        const fileInput = document.getElementById('file-input');
        const status = document.getElementById('status-msg');
        const bar = document.getElementById('progress-bar');
        const barParent = document.getElementById('prog-parent');

        if (!apiKey || !fileInput.files[0]) return alert("Key and Image required.");

        barParent.style.display = "block";
        bar.style.width = "10%";
        status.innerText = "SIGNAL_UPLOADING...";

        try {
            const file = fileInput.files[0];
            const base64Data = await fileToBase64(file);
            bar.style.width = "30%";
            status.innerText = "MODEL_PROCESSING...";

            // WORKHORSE MODEL: gemini-2.5-flash
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{
                    parts: [
                        { text: "Transcribe this sheet music to ABC notation. Provide ONLY raw text. Use [V:1] for melody and [V:2] for bass." },
                        { inline_data: { mime_type: file.type, data: base64Data } }
                    ]
                }]
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            bar.style.width = "70%";
            const data = await response.json();
            
            if (data.error) throw new Error(data.error.message);

            const aiText = data.candidates[0].content.parts[0].text;
            document.getElementById('abc-input').value = aiText.replace(/```abc/g, '').replace(/```/g, '').trim();
            
            bar.style.width = "100%";
            status.innerText = "TRANSCRIPTION_COMPLETE";
            setTimeout(() => { barParent.style.display = "none"; bar.style.width = "0%"; }, 1500);

        } catch (e) {
            status.innerText = "SIGNAL_INTERRUPTED: " + e.message;
            bar.style.backgroundColor = "#ff3333";
        }
    }

    function fileToBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
        });
    }

    function stopAll() {
        activeSources.forEach(s => { try { s.stop(); } catch(e) {} });
        activeSources = [];
        if (recorder && recorder.state === "recording") recorder.stop();
        document.getElementById('status-msg').innerText = "AUDIO_HALTED";
    }

    async function playAndRecord() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        stopAll();
        
        const status = document.getElementById('status-msg');
        const format = document.getElementById('export-format').value;
        const tempoScale = parseFloat(document.getElementById('tempo-scale').value);
        const pitchScale = parseFloat(document.getElementById('pitch-scale').value);
        
        audioChunks = [];
        document.getElementById('download-link').style.display = 'none';
        status.innerText = "RECORDING_STREAM...";

        const dest = audioCtx.createMediaStreamDestination();
        
        try {
            recorder = new MediaRecorder(dest.stream, { mimeType: format });
        } catch(e) {
            console.warn("MimeType fall-back initiated.");
            recorder = new MediaRecorder(dest.stream);
        }

        recorder.ondataavailable = e => audioChunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: format });
            const url = URL.createObjectURL(blob);
            const link = document.getElementById('download-link');
            const ext = format.split('/')[1];
            link.href = url;
            link.download = `chiptune_export_${Date.now()}.${ext}`;
            link.style.display = 'block';
            link.innerText = `DOWNLOAD_.${ext.toUpperCase()}_RENDER`;
            status.innerText = "RENDER_READY";
        };

        const rawText = document.getElementById('abc-input').value;
        const baseTempo = 0.5 / tempoScale;

        const v1Data = extractVoice(rawText, '[V:1]');
        const v2Data = extractVoice(rawText, '[V:2]');

        const startAt = audioCtx.currentTime + 0.1;
        const d1 = playVoice(v1Data, startAt, baseTempo, 'square', 0.08, dest, pitchScale);
        const d2 = playVoice(v2Data, startAt, baseTempo, 'triangle', 0.12, dest, pitchScale);

        recorder.start();
        setTimeout(() => { if (recorder.state === "recording") recorder.stop(); }, (Math.max(d1, d2) + 1) * 1000);
    }

    function extractVoice(text, tag) {
        if (!text.includes(tag)) return [];
        let parts = text.split(tag);
        if (parts.length < 2) return [];
        let section = parts[1].split('[V:')[0];
        let cleaned = section.replace(/\[([A-G,zZ][^\]]*)\]/gi, (m, notes) => notes.split(/[,]+/)[0] + (notes.includes(',,') ? ',,' : (notes.includes(',') ? ',' : '')));
        return cleaned.split('|').join(' ').trim().split(/\s+/);
    }

    function playVoice(symbols, start, tempo, type, vol, dest, pitchScale) {
        let playhead = start;
        symbols.forEach(s => {
            let dur = tempo;
            let note = s;
            if (s.includes('/2')) { dur = tempo/2; note = s.replace('/2',''); }
            else if (s.includes('2')) { dur = tempo*2; note = s.replace('2',''); }
            else if (s.includes('3')) { dur = tempo*3; note = s.replace('3',''); }
            
            if (noteFrequencies[note] !== undefined) {
                const freq = noteFrequencies[note] * pitchScale;
                scheduleNote(freq, playhead, dur, type, vol, dest);
            }
            playhead += dur;
        });
        return playhead - start;
    }

    function scheduleNote(freq, time, dur, type, vol, dest) {
        if (freq === 0) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, time);
        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(vol, time + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + dur - 0.02);
        osc.connect(gain).connect(audioCtx.destination);
        gain.connect(dest);
        osc.start(time);
        osc.stop(time + dur);
        activeSources.push(osc);
    }
</script>
</body>
</html>
