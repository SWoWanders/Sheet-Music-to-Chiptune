<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHIPTUNE_CORE_v5.0</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; --dim: #004411; --err: #ff3333; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .terminal { width: 98%; max-width: 900px; border: 2px solid var(--neon); padding: 15px; background: #000; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        .panel { border: 1px solid var(--dim); padding: 12px; background: #050505; }
        input, select, textarea { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        #console-monitor { width: 100%; height: 100px; background: #001100; border: 1px solid var(--dim); color: #00ff00; font-size: 11px; overflow-y: auto; padding: 5px; margin-top: 10px; white-space: pre-wrap; }
        button { background: var(--neon); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; }
        /* Progress Bar Styles */
        .progress-container { width: 100%; background: #222; height: 10px; margin-bottom: 10px; border: 1px solid var(--dim); display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--neon); transition: width 0.3s; }
        canvas { width: 100%; height: 60px; background: #000; border: 1px solid var(--dim); margin-top: 10px; }
        .slider-label { font-size: 0.7em; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="text-align:center; margin: 0 0 10px 0;">CHIPTUNE_CORE_v5.0</h2>
    
    <div class="grid">
        <div class="panel">
            <label style="font-size:0.7em;">1. SOURCE & TRANSCRIPTION</label>
            <input type="password" id="api-key" placeholder="Enter API Key...">
            <input type="file" id="file-input" accept="image/*">
            <div class="progress-container" id="p-cont"><div id="progress-bar"></div></div>
            <button id="btn-main" onclick="startWorkflow()">Transcribe Image</button>
        </div>
        
        <div class="panel">
            <label style="font-size:0.7em;">2. INSTRUMENT & MODULATION</label>
            <select id="wave-type">
                <option value="sawtooth">GRITTY SAWTOOTH (Tom Waits Style)</option>
                <option value="square">CLASSIC SQUARE (8-Bit NES)</option>
                <option value="triangle">TRIANGLE (Deep/Bass)</option>
                <option value="sine">SINE (Smooth)</option>
            </select>
            <div class="slider-label"><span>TEMPO</span><span id="tempo-val">1.0x</span></div>
            <input type="range" id="tempo-scale" min="0.5" max="2.5" step="0.1" value="1.0" oninput="document.getElementById('tempo-val').innerText=this.value+'x'">
            <div class="slider-label"><span>VIBRATO</span><span id="vib-val">25</span></div>
            <input type="range" id="vibrato-depth" min="0" max="50" step="1" value="25" oninput="document.getElementById('vib-val').innerText=this.value">
        </div>
    </div>

    <div id="console-monitor">SYSTEM_READY...</div>
    <canvas id="visualizer"></canvas>
    <textarea id="abc-input" rows="5" placeholder="ABC buffer..."></textarea>

    <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="playMusic()" style="flex:2; background:#00ff41;">▶ PLAY AUDIO</button>
        <button onclick="stopAll()" style="background:var(--err); color:white; flex:1;">■ STOP</button>
    </div>
</div>

<script>
    const noteMap = { "C": 261.63, "^C": 277.18, "_D": 277.18, "D": 293.66, "^D": 311.13, "_E": 311.13, "E": 329.63, "F": 349.23, "^F": 369.99, "_G": 369.99, "G": 392.00, "^G": 415.30, "_A": 415.30, "A": 440.00, "^A": 466.16, "_B": 466.16, "B": 493.88, "z": 0 };
    let audioCtx = null, activeSources = [], analyzer = null, activeModel = null;

    function sysLog(msg) {
        const mon = document.getElementById('console-monitor');
        mon.innerHTML += `\n> ${msg}`;
        mon.scrollTop = mon.scrollHeight;
    }

    function updateProgress(pct) {
        document.getElementById('p-cont').style.display = 'block';
        document.getElementById('progress-bar').style.width = pct + '%';
    }

    async function startWorkflow() {
        const key = document.getElementById('api-key').value.trim();
        const file = document.getElementById('file-input').files[0];
        if(!key || !file) return sysLog("ERROR: Key or File missing.");

        updateProgress(10);
        sysLog("STAGING: Negotiating with API...");

        try {
            if (!activeModel) {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${key}`);
                const data = await res.json();
                const prefs = ["gemini-1.5-flash", "gemini-1.5-pro", "gemini-pro-vision"];
                activeModel = prefs.find(p => data.models.some(m => m.name.includes(p))) || data.models[0].name.split('/').pop();
            }
            updateProgress(40);
            sysLog(`ENGINE: Linked to ${activeModel}`);

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                updateProgress(60);
                const b64 = reader.result.split(',')[1];
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/${activeModel}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [
                        { text: "Convert to raw ABC notation. No text blocks." },
                        { inline_data: { mime_type: file.type, data: b64 } }
                    ]}] })
                });
                const data = await res.json();
                updateProgress(100);
                if(data.candidates) {
                    document.getElementById('abc-input').value = data.candidates[0].content.parts[0].text.replace(/```abc|```/g, '').trim();
                    sysLog("SUCCESS: Buffer synchronized.");
                } else { throw new Error("Transcription failed."); }
                setTimeout(() => document.getElementById('p-cont').style.display = 'none', 1000);
            };
        } catch(e) { sysLog("FATAL: " + e.message); updateProgress(0); }
    }

    function playMusic() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        stopAll();
        analyzer = audioCtx.createAnalyser();
        drawVisualizer();

        const raw = document.getElementById('abc-input').value;
        const tempo = 0.25 / parseFloat(document.getElementById('tempo-scale').value);
        const wave = document.getElementById('wave-type').value;
        const vib = parseFloat(document.getElementById('vibrato-depth').value);

        sysLog("AUDIO: Synthesizing voices...");
        let h = audioCtx.currentTime + 0.1;
        const tokens = raw.match(/([_^^]*[a-gA-G,zZ]+[']*[\d\/]*)/g) || [];

        tokens.forEach(tok => {
            let m = tok.match(/^([_^^]*)([a-gA-G,zZ]+)([']*)([\d\/]*)$/);
            if(!m) return;
            let base = m[1] + m[2].toUpperCase().replace(/,/g, '');
            let f = noteMap[base];
            if(m[2].toLowerCase() === m[2]) f *= 2;
            if(m[2].includes(',')) f /= 2;
            if(m[3]) f *= Math.pow(2, m[3].length);
            let dur = (parseFloat(m[4]) || 1) * tempo;

            if(f > 0) {
                const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
                osc.type = wave; osc.frequency.setValueAtTime(f, h);
                if (vib > 0) {
                    const lfo = audioCtx.createOscillator(), lg = audioCtx.createGain();
                    lfo.frequency.value = 6; lg.gain.value = vib;
                    lfo.connect(lg); lg.connect(osc.frequency);
                    lfo.start(h); lfo.stop(h+dur); activeSources.push(lfo);
                }
                g.gain.setValueAtTime(0, h);
                g.gain.linearRampToValueAtTime(0.2, h + 0.02);
                g.gain.linearRampToValueAtTime(0, h + dur);
                osc.connect(g).connect(analyzer).connect(audioCtx.destination);
                osc.start(h); osc.stop(h + dur); activeSources.push(osc);
            }
            h += dur;
        });
    }

    function drawVisualizer() {
        requestAnimationFrame(drawVisualizer);
        const canvas = document.getElementById('visualizer'), ctx = canvas.getContext('2d');
        const data = new Uint8Array(analyzer.frequencyBinCount);
        analyzer.getByteTimeDomainData(data);
        ctx.fillStyle = 'black'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#00ff41'; ctx.beginPath();
        let x = 0, slice = canvas.width / data.length;
        for(let i=0; i<data.length; i++) {
            let y = (data[i]/128.0) * canvas.height/2;
            i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            x += slice;
        }
        ctx.stroke();
    }

    function stopAll() { activeSources.forEach(s => { try{s.stop()}catch(e){} }); activeSources = []; }
</script>
</body>
</html>
