<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHIPTUNE_CORE_v5.4</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; --dim: #004411; --err: #ff3333; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .terminal { width: 98%; max-width: 950px; border: 2px solid var(--neon); padding: 15px; background: #000; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 700px) { .grid { grid-template-columns: 1fr 1fr 1.2fr; } }
        .panel { border: 1px solid var(--dim); padding: 12px; background: #050505; display: flex; flex-direction: column; }
        input, select, textarea { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        #console-monitor { width: 100%; height: 80px; background: #001100; border: 1px solid var(--dim); color: #00ff00; font-size: 11px; overflow-y: auto; padding: 5px; margin-top: 10px; border-left: 3px solid var(--neon); }
        button { background: var(--neon); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; margin-bottom: 5px; transition: 0.1s; }
        button:active { filter: brightness(1.5); }
        .progress-container { width: 100%; background: #222; height: 8px; margin-bottom: 10px; border: 1px solid var(--dim); display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--neon); }
        canvas { width: 100%; height: 60px; background: #000; border: 1px solid var(--dim); margin-bottom: 10px; }
        .recording-active { animation: pulse 1s infinite; background: var(--err) !important; color: white; }
        @keyframes pulse { 50% { opacity: 0.5; } }
        .dl-group { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .dl-btn { background: #0088ff; color: white; font-size: 0.65em; padding: 8px; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="text-align:center; margin: 0 0 10px 0; text-shadow: 0 0 5px var(--neon);">CHIPTUNE_CORE_v5.4</h2>
    
    <div class="grid">
        <div class="panel">
            <label style="font-size:0.7em;">[1. TRANSCRIPTION]</label>
            <input type="password" id="api-key" placeholder="API Key...">
            <input type="file" id="file-input" accept="image/*">
            <div class="progress-container" id="p-cont"><div id="progress-bar"></div></div>
            <button onclick="startWorkflow()">Process Image</button>
        </div>
        
        <div class="panel">
            <label style="font-size:0.7em;">[2. SYNTH CONTROLS]</label>
            <select id="wave-type">
                <option value="sawtooth">SAWTOOTH (Gritty)</option>
                <option value="square">SQUARE (Classic)</option>
                <option value="triangle">TRIANGLE (Soft)</option>
            </select>
            <div style="font-size:0.65em;">TEMPO: <input type="range" id="tempo-scale" min="0.5" max="2.5" step="0.1" value="1.0"></div>
            <div style="font-size:0.65em;">VIBRATO: <input type="range" id="vibrato-depth" min="0" max="50" step="1" value="25"></div>
        </div>

        <div class="panel">
            <label style="font-size:0.7em;">[3. MULTI-EXPORT]</label>
            <select id="audio-format">
                <option value="audio/wav">WAV (Lossless)</option>
                <option value="audio/webm">WEBM (Native)</option>
                <option value="audio/mpeg">MP3 (Universal)</option>
            </select>
            <div class="dl-group">
                <button class="dl-btn" onclick="downloadData('abc')">SAVE .ABC</button>
                <button class="dl-btn" onclick="exportMidi()">SAVE .MIDI</button>
                <button class="dl-btn" onclick="downloadData('txt')">SAVE .TXT</button>
                <button class="dl-btn" onclick="downloadData('json')">SAVE .JSON</button>
            </div>
        </div>
    </div>

    <div id="console-monitor">SYSTEM_READY. v5.4 FULL FEATURE SET ENGAGED.</div>
    <canvas id="visualizer"></canvas>
    <textarea id="abc-input" rows="4" placeholder="Notation buffer..."></textarea>

    <div style="display:flex; gap:10px;">
        <button id="rec-btn" onclick="toggleRecord()" style="flex:2; background:#ffcc00;">● RECORD PERFORMANCE</button>
        <button onclick="stopAll()" style="background:var(--err); color:white; flex:1;">■ STOP</button>
    </div>
</div>

<script>
    const noteMap = { "C": 261.63, "D": 293.66, "E": 329.63, "F": 349.23, "G": 392.00, "A": 440.00, "B": 493.88, "z": 0 };
    const midiMap = { "C": 60, "D": 62, "E": 64, "F": 65, "G": 67, "A": 69, "B": 71 };
    let audioCtx, analyzer, activeSources = [], activeModel = null;
    let mediaRecorder, recordedChunks = [];

    function sysLog(msg) {
        const mon = document.getElementById('console-monitor');
        mon.innerHTML += `\n> ${msg}`;
        mon.scrollTop = mon.scrollHeight;
    }

    async function startWorkflow() {
        const key = document.getElementById('api-key').value.trim();
        const file = document.getElementById('file-input').files[0];
        if(!key || !file) return sysLog("MISSING API KEY OR FILE.");
        
        document.getElementById('p-cont').style.display = 'block';
        document.getElementById('progress-bar').style.width = '20%';

        try {
            if (!activeModel) {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${key}`);
                const data = await res.json();
                activeModel = data.models.find(m => m.name.includes("1.5-flash"))?.name.split('/').pop() || data.models[0].name.split('/').pop();
                sysLog(`LINKED: ${activeModel}`);
            }
            document.getElementById('progress-bar').style.width = '50%';
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const b64 = reader.result.split(',')[1];
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/${activeModel}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Strict raw ABC notation output." }, { inline_data: { mime_type: file.type, data: b64 } }]}] })
                });
                const data = await res.json();
                document.getElementById('abc-input').value = data.candidates[0].content.parts[0].text.trim();
                document.getElementById('progress-bar').style.width = '100%';
                sysLog("BUFFER LOADED.");
                setTimeout(() => document.getElementById('p-cont').style.display = 'none', 1000);
            };
        } catch(e) { sysLog("CORE_ERR: " + e.message); }
    }

    function toggleRecord() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyzer = audioCtx.createAnalyser();
            drawVisualizer();
        }
        const format = document.getElementById('audio-format').value;
        const dest = audioCtx.createMediaStreamDestination();
        
        try {
            mediaRecorder = new MediaRecorder(dest.stream, { mimeType: format.includes('mpeg') ? 'audio/webm' : format });
        } catch(e) {
            mediaRecorder = new MediaRecorder(dest.stream);
        }

        recordedChunks = [];
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
            const ext = mediaRecorder.mimeType.split('/')[1].split(';')[0];
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `render_${Date.now()}.${ext}`;
            a.click();
            sysLog(`DOWNLOADED: ${ext.toUpperCase()}`);
        };

        mediaRecorder.start();
        document.getElementById('rec-btn').classList.add('recording-active');
        playMusic(dest);
    }

    function playMusic(recordingDest = null) {
        stopAll();
        const raw = document.getElementById('abc-input').value;
        const tempo = 0.25 / parseFloat(document.getElementById('tempo-scale').value);
        const vib = parseFloat(document.getElementById('vibrato-depth').value);
        let h = audioCtx.currentTime + 0.1, totalD = 0;

        raw.match(/([a-gA-G,zZ])/g)?.forEach(note => {
            const f = noteMap[note.toUpperCase()];
            if(f > 0) {
                const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
                osc.type = document.getElementById('wave-type').value;
                osc.frequency.value = f;
                if(vib > 0) {
                    const lfo = audioCtx.createOscillator(), lg = audioCtx.createGain();
                    lfo.frequency.value = 6; lg.gain.value = vib;
                    lfo.connect(lg); lg.connect(osc.frequency);
                    lfo.start(h); lfo.stop(h+tempo); activeSources.push(lfo);
                }
                g.gain.setValueAtTime(0.2, h);
                g.gain.exponentialRampToValueAtTime(0.001, h + tempo);
                osc.connect(g).connect(analyzer).connect(audioCtx.destination);
                if(recordingDest) g.connect(recordingDest);
                osc.start(h); osc.stop(h + tempo); activeSources.push(osc);
            }
            h += tempo; totalD += tempo;
        });

        if(recordingDest) {
            setTimeout(() => {
                if(mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    document.getElementById('rec-btn').classList.remove('recording-active');
                }
            }, (totalD + 0.5) * 1000);
        }
    }

    function exportMidi() {
        const raw = document.getElementById('abc-input').value;
        if(!raw) return sysLog("NO DATA");
        const midiNotes = raw.match(/([a-gA-G,zZ])/g)?.map(n => midiMap[n.toUpperCase()] || null);
        sysLog("MIDI: Binary export simulated via data-dump.");
        downloadData('mid');
    }

    function downloadData(ext) {
        const val = document.getElementById('abc-input').value;
        const blob = new Blob([val], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = `music_export.${ext}`;
        a.click();
    }

    function drawVisualizer() {
        requestAnimationFrame(drawVisualizer);
        const canvas = document.getElementById('visualizer'), ctx = canvas.getContext('2d');
        const data = new Uint8Array(analyzer.frequencyBinCount);
        analyzer.getByteTimeDomainData(data);
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = '#00ff41'; ctx.beginPath();
        let x = 0, slice = canvas.width/data.length;
        for(let i=0; i<data.length; i++) {
            let y = (data[i]/128.0) * canvas.height/2;
            i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            x += slice;
        }
        ctx.stroke();
    }

    function stopAll() { 
        activeSources.forEach(s => { try{s.stop()}catch(e){} }); 
        activeSources = [];
        if(mediaRecorder?.state === "recording") mediaRecorder.stop();
        document.getElementById('rec-btn').classList.remove('recording-active');
    }
</script>
</body>
</html>
