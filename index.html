<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyChip Maestro</title>
    <style>
        :root { 
            --neon: #00ff41; --bg: #0a0a0a; --dim: #004411; --err: #ff3333; 
            --accent: #0088ff; --warm: #ffaa00; --white-key: #e0e0e0; --black-key: #333;
            --playhead: #ff0044; --grid: #1a331a; --active-note: #00ffff;
        }
        body { 
            font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); 
            padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0;
            touch-action: manipulation;
        }
        .terminal { 
            width: 98%; max-width: 1200px; border: 2px solid var(--neon); padding: 15px; 
            background: #000; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,255,65,0.2);
        }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 900px) { .grid { grid-template-columns: 1fr 1fr 1.2fr; } }
        .panel { border: 1px solid var(--dim); padding: 12px; background: #050505; display: flex; flex-direction: column; }
        input, select, textarea { 
            background: #000; border: 1px solid var(--neon); color: var(--neon); 
            padding: 8px; font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 10px;
            font-size: 16px;
        }
        #console-monitor { 
            width: 100%; height: 120px; background: #001100; border: 1px solid var(--dim); 
            color: #00ff00; font-size: 11px; overflow-y: auto; padding: 5px; margin-top: 10px; 
            border-left: 3px solid var(--neon); font-family: monospace;
        }
