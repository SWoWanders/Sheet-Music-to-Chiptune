<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chiptune Engine v0.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .terminal { width: 90%; max-width: 800px; border: 2px solid var(--neon); padding: 20px; box-shadow: 0 0 20px rgba(0,255,65,0.2); background: #000; }
        h1 { text-align: center; border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-top: 0; text-shadow: 0 0 10px var(--neon); }
        textarea { width: 100%; height: 200px; background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 10px; font-family: inherit; margin: 15px 0; outline: none; resize: none; }
        .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button { background: var(--neon); color: #000; border: none; padding: 12px 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        .status { margin-top: 15px; font-size: 0.8em; text-align: center; color: #666; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>CHIPTUNE_OMR_v0.5</h1>
    
    <label>[SYSTEM]: PASTE_ABC_NOTATION_HERE</label>
    <textarea id="abc-input">X:1
T:Happy Birthday
M:3/4
L:1/4
K:C
[V:1] z2 G/2G/2 | A G c | B2 G/2G/2 | A G d | c2 G/2G/2 | g e c | B A f/2f/2 | e c d | c3 |]
[V:2] Z | [C,E,G,]3 | [B,,D,G,]3 | [B,,D,G,]3 | [C,E,G,]3 | [C,E,G,]3 | [C,F,A,] z2 | [C,E,G,] z [B,,D,G,] | [C,E,G,]3 |]</textarea>

    <div class="controls">
        <button onclick="playFullSong()">▶ PLAY_CHIPTUNE</button>
        <button onclick="stopAll()" style="background:#f00; color:#fff;">■ STOP</button>
        <button onclick="alert('Step 6: We will build the MP3 export logic next!')">💾 EXPORT_MP3</button>
    </div>
    
    <div class="status" id="status-msg">READY_FOR_PLAYBACK...</div>
</div>

<script>
    // FREQUENCY DICTIONARY
    const noteFrequencies = {
        "z": 0,
        "C,,": 65.41, "D,,": 73.42, "E,,": 82.41, "F,,": 87.31, "G,,": 98.00, "A,,": 110.00, "B,,": 123.47,
        "C,": 130.81, "D,": 146.83, "E,": 164.81, "F,": 174.61, "G,": 196.00, "A,": 220.00, "B,": 246.94,
        "C": 261.63, "D": 293.66, "E": 329.63, "F": 349.23, "G": 392.00, "A": 440.00, "B": 493.88,
        "c": 523.25, "d": 587.33, "e": 659.25, "f": 698.46, "g": 783.99
    };

    let audioCtx = null;
    let activeSources = [];

    function stopAll() {
        activeSources.forEach(s => s.stop());
        activeSources = [];
        document.getElementById('status-msg').innerText = "PLAYBACK_STOPPED";
    }

    function playFullSong() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        stopAll();
        document.getElementById('status-msg').innerText = "SYNTHESIZING_VOICES...";

        const rawText = document.getElementById('abc-input').value;
        const baseTempo = 0.5;

        const v1Data = extractVoice(rawText, '[V:1]');
        const v2Data = extractVoice(rawText, '[V:2]');

        const startTime = audioCtx.currentTime + 0.1;
        
        // Channel 1: Square Lead
        playVoice(v1Data, startTime, baseTempo, 'square', 0.08);
        // Channel 2: Triangle Bass
        playVoice(v2Data, startTime, baseTempo, 'triangle', 0.12);
    }

    function extractVoice(text, tag) {
        if (!text.includes(tag)) return [];
        let part = text.split(tag)[1].split('[V:')[0];
        // Basic cleanup of bars and chords
        return part.split('|').join(' ').replace(/[\[\]]/g, ' ').trim().split(/\s+/);
    }

    function playVoice(symbols, start, tempo, type, vol) {
        let playhead = start;
        symbols.forEach(s => {
            let dur = tempo;
            let note = s;

            if (s.includes('/2')) { dur = tempo/2; note = s.replace('/2',''); }
            else if (s.includes('2')) { dur = tempo*2; note = s.replace('2',''); }
            else if (s.includes('3')) { dur = tempo*3; note = s.replace('3',''); }

            // Take first note if it's a chord artifact
            if (note.includes(',')) note = note.split(',')[0] + (note.includes(',,') ? ',,' : ',');
            
            if (noteFrequencies[note] !== undefined) {
                scheduleNote(noteFrequencies[note], playhead, dur, type, vol);
            }
            playhead += dur;
        });
    }

    function scheduleNote(freq, time, dur, type, vol) {
        if (freq === 0) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(freq, time);
        
        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(vol, time + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + dur - 0.02);

        osc.connect(gain).connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + dur);
        activeSources.push(osc);
    }
</script>
</body>
</html>
