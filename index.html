<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHIPTUNE_CORE_v4.6</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; --dim: #004411; --err: #ff3333; --warn: #ffcc00; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .terminal { width: 98%; max-width: 900px; border: 2px solid var(--neon); padding: 15px; background: #000; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        .panel { border: 1px solid var(--dim); padding: 12px; background: #050505; }
        input, select, textarea { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        #console-monitor { width: 100%; height: 120px; background: #001100; border: 1px solid var(--dim); color: #00ff00; font-size: 11px; overflow-y: auto; padding: 5px; margin-top: 10px; white-space: pre-wrap; }
        button { background: var(--neon); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; margin-bottom: 5px; }
        .sending { background: var(--warn) !important; }
        canvas { width: 100%; height: 60px; background: #000; border: 1px solid var(--dim); margin-top: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="text-align:center; margin: 0 0 10px 0;">CHIPTUNE_CORE_v4.6</h2>
    <div class="grid">
        <div class="panel">
            <label style="font-size:0.7em;">1. IMAGE TO MUSIC SOURCE</label>
            <input type="password" id="api-key" placeholder="Enter API Key...">
            <input type="file" id="file-input" accept="image/*">
            <button id="btn-transcribe" onclick="runAnalysis()">RUN_TRANSCRIPTION</button>
            <button onclick="mockABC()" style="background:#444; color:#fff; font-size:0.65em;">DEBUG: LOAD MOCK (FAILSAFE)</button>
        </div>
        <div class="panel">
            <label style="font-size:0.7em;">2. MODULATION & PRESETS</label>
            <select id="wave-type">
                <option value="sawtooth">GRITTY SAWTOOTH (Tom Waits Style)</option>
                <option value="square">CLASSIC SQUARE (8-Bit NES)</option>
                <option value="triangle">TRIANGLE (Deep/Bass)</option>
            </select>
            <div style="font-size:0.7em;">TEMPO: <input type="range" id="tempo-scale" min="0.2" max="3.0" step="0.1" value="1.0"></div>
            <div style="font-size:0.7em;">VIBRATO: <input type="range" id="vibrato-depth" min="0" max="50" step="1" value="25"></div>
        </div>
    </div>

    <div id="console-monitor">SYSTEM_READY... [V4.6 STABLE_INIT]</div>
    <canvas id="visualizer"></canvas>
    <textarea id="abc-input" rows="5" placeholder="ABC buffer..."></textarea>

    <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="playAndRecord()" style="flex:2; background:#00ff41;">▶ PLAY & RECORD ALL</button>
        <button onclick="stopAll()" style="background:var(--err); color:white; flex:1;">■ STOP</button>
    </div>
    <div id="download-zone" style="text-align:center;"></div>
</div>

<script>
    const noteMap = { "C": 261.63, "^C": 277.18, "_D": 277.18, "D": 293.66, "^D": 311.13, "_E": 311.13, "E": 329.63, "F": 349.23, "^F": 369.99, "_G": 369.99, "G": 392.00, "^G": 415.30, "_A": 415.30, "A": 440.00, "^A": 466.16, "_B": 466.16, "B": 493.88, "z": 0 };
    let audioCtx = null, activeSources = [], recorder = null, audioChunks = [], analyzer = null;

    function sysLog(msg) {
        const mon = document.getElementById('console-monitor');
        mon.innerHTML += `\n[${new Date().toLocaleTimeString()}] >> ${msg}`;
        mon.scrollTop = mon.scrollHeight;
    }

    function mockABC() {
        document.getElementById('abc-input').value = "X:1\nT:Blues for the Observatory\nM:4/4\nL:1/8\n[V:1] [CEG]2 z [CEG] z [CFA] [^DGB]2 | [CEG]4 [B,DG]4 | [C,E,G,]8 |\n[V:2] C,2 E,2 G,2 A,2 | G,2 F,2 E,2 D,2 | C,8 |";
        sysLog("DEBUG: Mock data injected. You can now press PLAY.");
    }

    async function runAnalysis() {
        const btn = document.getElementById('btn-transcribe');
        const key = document.getElementById('api-key').value.trim();
        const file = document.getElementById('file-input').files[0];
        if(!key || !file) return sysLog("ERROR: Credentials or source file missing.");

        btn.classList.add('sending'); btn.innerText = "LINKING...";
        sysLog("INIT: Querying v1/models/gemini-1.5-pro...");

        try {
            const b64 = await new Promise((res, rej) => {
                const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(file);
            });

            // Trying 1.5-pro on v1 endpoint which is often more lenient with resource names
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-pro:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [
                    { text: "Convert this sheet music image to valid ABC notation. Include V:1 and V:2 voices. Output ONLY the raw notation code." },
                    { inline_data: { mime_type: file.type, data: b64 } }
                ]}] })
            });

            const data = await res.json();
            if(data.error) {
                sysLog(`PRIMARY FAIL: ${data.error.message}. Switching to Flash fallback...`);
                // Fallback attempt with a slightly different resource name format
                return runFallback(key, file, b64);
            }

            if(data.candidates) {
                document.getElementById('abc-input').value = data.candidates[0].content.parts[0].text.replace(/```abc|```/g, '').trim();
                sysLog("LINK ESTABLISHED: ABC data received.");
            }
        } catch(e) { sysLog("FATAL: " + e.message); }
        finally { btn.classList.remove('sending'); btn.innerText = "RUN_TRANSCRIPTION"; }
    }

    async function runFallback(key, file, b64) {
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [
                    { text: "Sheet music image to ABC notation. Raw code only." },
                    { inline_data: { mime_type: file.type, data: b64 } }
                ]}] })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            document.getElementById('abc-input').value = data.candidates[0].content.parts[0].text.replace(/```abc|```/g, '').trim();
            sysLog("FALLBACK SUCCESS: Buffer loaded.");
        } catch(e) { sysLog("CRITICAL FAILURE: " + e.message + ". Please use DEBUG button."); }
    }

    function scheduleNote(f, t, d, type, vol, dest, v) {
        if(f <= 0) return;
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(f, t);
        if (v > 0) {
            const lfo = audioCtx.createOscillator(), lg = audioCtx.createGain();
            lfo.frequency.setValueAtTime(6, t); lg.gain.setValueAtTime(v, t);
            lfo.connect(lg); lg.connect(osc.frequency);
            lfo.start(t); lfo.stop(t+d); activeSources.push(lfo);
        }
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol, t + 0.02);
        g.gain.linearRampToValueAtTime(0, t + d);
        osc.connect(g).connect(audioCtx.destination);
        g.connect(analyzer); g.connect(dest);
        osc.start(t); osc.stop(t + d); activeSources.push(osc);
    }

    async function playAndRecord() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        stopAll(); analyzer = audioCtx.createAnalyser(); draw();
        const dest = audioCtx.createMediaStreamDestination();
        recorder = new MediaRecorder(dest.stream); audioChunks = [];
        recorder.ondataavailable = e => audioChunks.push(e.data);

        const tempo = 0.25 / parseFloat(document.getElementById('tempo-scale').value);
        const wave = document.getElementById('wave-type').value;
        const vib = parseFloat(document.getElementById('vibrato-depth').value);
        const raw = document.getElementById('abc-input').value;
        if(!raw) return sysLog("HALT: ABC buffer is empty.");

        recorder.start();
        sysLog("AUDIO: Synthesizing voices...");

        const voices = [...new Set(raw.match(/V:\d+/g) || ["V:1"])];
        let maxEnd = 0;

        voices.forEach((vTag, idx) => {
            const match = raw.match(new RegExp(`${vTag}\\s*([\\s\\S]*?)(?=V:\\d+|$)`));
            const content = match ? match[1] : (idx === 0 ? raw : "");
            let h = audioCtx.currentTime + 0.1;
            const tokens = content.match(/\[[a-gA-G,']+\d*\]/g) || content.match(/([_^^]*[a-gA-G,zZ]+[']*[\d\/]*)/g) || [];

            tokens.forEach(tok => {
                const parse = (n) => {
                    let m = n.match(/^([_^^]*)([a-gA-G,zZ]+)([']*)([\d\/]*)$/);
                    if(!m) return null;
                    let base = m[1] + m[2].toUpperCase().replace(/,/g, '');
                    let f = noteMap[base];
                    if(m[2].toLowerCase() === m[2]) f *= 2;
                    if(m[2].includes(',')) f /= 2;
                    if(m[3]) f *= Math.pow(2, m[3].length);
                    return { f, d: (parseFloat(m[4]) || 1) };
                };
                if (tok.startsWith('[')) {
                    const notes = tok.match(/([_^^]*[a-gA-G,zZ]+[']*[\d\/]*)/g) || [];
                    notes.forEach(n => {
                        const p = parse(n);
                        if(p) scheduleNote(p.f, h, tempo * p.d, idx===0?wave:'triangle', 0.15, dest, vib);
                    });
                    h += tempo;
                } else {
                    const p = parse(tok);
                    if(p) {
                        scheduleNote(p.f, h, tempo * p.d, idx===0?wave:'triangle', 0.15, dest, vib);
                        h += (tempo * p.d);
                    }
                }
            });
            maxEnd = Math.max(maxEnd, h);
        });

        recorder.onstop = () => {
            const zone = document.getElementById('download-zone');
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob(audioChunks, { type: 'audio/webm' }));
            link.download = `Chiptune_v4.6.webm`; link.innerText = "DOWNLOAD_MASTER_RENDER";
            link.style.cssText = "display:block; margin-top:10px; color:cyan; text-decoration:none; border:1px solid cyan; padding:10px;";
            zone.innerHTML = ''; zone.appendChild(link);
        };
        setTimeout(() => { if(recorder.state === "recording") recorder.stop(); }, (maxEnd - audioCtx.currentTime) * 1000 + 1000);
    }

    function draw() {
        if (!analyzer) return; requestAnimationFrame(draw);
        const c = document.getElementById('visualizer'), ctx = c.getContext('2d');
        const d = new Uint8Array(analyzer.frequencyBinCount);
        analyzer.getByteTimeDomainData(d);
        ctx.fillStyle = 'black'; ctx.fillRect(0, 0, c.width, c.height);
        ctx.lineWidth = 2; ctx.strokeStyle = '#00ff41'; ctx.beginPath();
        let x = 0, sl = c.width / d.length;
        for (let i = 0; i < d.length; i++) {
            let y = (d[i] / 128.0) * c.height / 2;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            x += sl;
        }
        ctx.stroke();
    }

    function stopAll() { activeSources.forEach(s => { try{s.stop()}catch(e){} }); activeSources = []; if(recorder?.state==="recording") recorder.stop(); }
</script>
</body>
</html>
