<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyChip Maestro</title>
    <style>
        :root { 
            --neon: #00ff41; --bg: #0a0a0a; --dim: #004411; --err: #ff3333; 
            --accent: #0088ff; --warm: #ffaa00; --white-key: #e0e0e0; --black-key: #333;
            --playhead: #ff0044; --grid: #1a331a; --active-note: #00ffff;
        }
        body { 
            font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); 
            padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0;
            touch-action: manipulation;
        }
        .terminal { 
            width: 98%; max-width: 1200px; border: 2px solid var(--neon); padding: 15px; 
            background: #000; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,255,65,0.2);
        }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 900px) { .grid { grid-template-columns: 1fr 1fr 1.2fr; } }
        .panel { border: 1px solid var(--dim); padding: 12px; background: #050505; display: flex; flex-direction: column; }
        input, select, textarea { 
            background: #000; border: 1px solid var(--neon); color: var(--neon); 
            padding: 8px; font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 10px;
            font-size: 16px;
        }
        #console-monitor { 
            width: 100%; height: 120px; background: #001100; border: 1px solid var(--dim); 
            color: #00ff00; font-size: 11px; overflow-y: auto; padding: 5px; margin-top: 10px; 
            border-left: 3px solid var(--neon); font-family: monospace;
        }
        button { 
            background: var(--neon); color: #000; border: none; padding: 15px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; 
            margin-bottom: 5px; transition: 0.1s; font-size: 14px;
            min-height: 44px;
        }
        button:active { filter: brightness(1.5); transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .progress-container { width: 100%; background: #222; height: 8px; margin-bottom: 10px; border: 1px solid var(--dim); display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--neon); transition: width 0.3s; }
        canvas { width: 100%; height: 80px; background: #000; border: 1px solid var(--dim); margin-bottom: 10px; }
        .recording-active { animation: pulse 1s infinite; background: var(--err) !important; color: white; }
        @keyframes pulse { 50% { opacity: 0.7; } }
        .dl-group { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .dl-btn { background: var(--accent); color: white; font-size: 0.65em; padding: 10px; }
        .play-btn { background: #00cc66; }
        .stop-btn { background: var(--err); color: white; }
        
        .piano-roll-container {
            width: 100%; height: 250px; background: #000; border: 2px solid var(--dim);
            position: relative; overflow: hidden; margin-bottom: 10px;
        }
        .piano-roll-scroll { width: 100%; height: 100%; overflow-x: auto; overflow-y: hidden; position: relative; }
        .piano-roll-content { height: 100%; position: relative; display: flex; }
        .piano-keys {
            width: 50px; height: 100%; flex-shrink: 0; background: #111; border-right: 2px solid var(--dim);
            position: sticky; left: 0; z-index: 10;
        }
        .piano-key {
            height: 16px; border-bottom: 1px solid #333; display: flex; align-items: center;
            justify-content: flex-end; padding-right: 4px; font-size: 9px; box-sizing: border-box;
        }
        .piano-key.white { background: var(--white-key); color: #000; }
        .piano-key.black { background: var(--black-key); color: #fff; z-index: 11; border: 1px solid #555; }
        .note-grid {
            height: 100%; position: relative;
            background: linear-gradient(to right, var(--grid) 1px, transparent 1px), linear-gradient(to bottom, #0a1a0a 1px, transparent 1px);
            background-size: 40px 16px;
