<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chiptune System v2.0</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; --dim: #004411; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--neon); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .terminal { width: 95%; max-width: 900px; border: 2px solid var(--neon); padding: 20px; background: #000; box-shadow: 0 0 20px rgba(0,255,65,0.3); }
        h1 { text-align: center; border-bottom: 2px solid var(--neon); padding-bottom: 10px; text-shadow: 0 0 8px var(--neon); margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel { border: 1px solid var(--dim); padding: 15px; background: #050505; }
        input, textarea { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; font-family: inherit; width: 100%; box-sizing: border-box; }
        label { font-size: 0.7em; color: #888; text-transform: uppercase; margin-bottom: 5px; display: block; }
        canvas { width: 100%; height: 100px; background: #000; border: 1px solid var(--dim); margin: 10px 0; }
        .slider-group { margin: 10px 0; }
        .slider-group div { display: flex; justify-content: space-between; font-size: 0.7em; margin-bottom: 3px; }
        button { background: var(--neon); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 10px; }
        button:hover { background: #fff; }
        #stop-btn { background: #ff3333; color: white; }
        #download-link { display: none; color: #fff; text-align: center; font-weight: bold; padding: 15px; border: 1px solid #fff; margin-top: 10px; text-decoration: none; }
        .status { font-size: 0.7em; text-align: center; margin-top: 10px; color: var(--neon); }
    </style>
</head>
<body>

<div class="terminal">
    <h1>CHIPTUNE_CORE_v2.0</h1>
    <div class="grid">
        <div class="panel">
            <label>1. AUTH & SOURCE</label>
            <input type="text" id="api-key" placeholder="Gemini API Key...">
            <input type="file" id="file-input" style="margin-top:10px;">
            <button onclick="analyzeWithPrecision()">RUN_ANALYSIS</button>
        </div>
        <div class="panel">
            <label>2. SIGNAL MODULATION</label>
            <div class="slider-group">
                <div><span>TEMPO</span><span id="t-val">1.0x</span></div>
                <input type="range" id="tempo-scale" min="0.2" max="3.0" step="0.1" value="1.0" oninput="document.getElementById('t-val').innerText=this.value+'x'">
            </div>
            <div class="slider-group">
                <div><span>PITCH</span><span id="p-val">1.0x</span></div>
                <input type="range" id="pitch-scale" min="0.5" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('p-val').innerText=this.value+'x'">
            </div>
            <div class="slider-group">
                <div><span>VIBRATO</span><span id="v-val">0</span></div>
                <input type="range" id="vibrato-depth" min="0" max="15" step="1" value="0" oninput="document.getElementById('v-val').innerText=this.value">
            </div>
        </div>
    </div>

    <label>3. OSCILLOSCOPE & BUFFER</label>
    <canvas id="visualizer"></canvas>
    <textarea id="abc-input" rows="6" placeholder="Awaiting verified ABC notation..."></textarea>

    <div style="display:flex; gap:10px; margin-top:15px;">
        <button onclick="playAndRecord()" style="flex:2;">▶ PLAY & RECORD</button>
        <button id="stop-btn" onclick="stopAll()" style="flex:1;">■ STOP</button>
    </div>
    
    <a id="download-link">DOWNLOAD_MASTER_RENDER</a>
    <div class="status" id="status-msg">SYSTEM_READY // ALL_MODULES_ONLINE</div>
</div>

<script>
    const noteMap = { "C": 261.63, "^C": 277.18, "_D": 277.18, "D": 293.66, "^D": 311.13, "_E": 311.13, "E": 329.63, "F": 349.23, "^F": 369.99, "_G": 369.99, "G": 392.00, "^G": 415.30, "_A": 415.30, "A": 440.00, "^A": 466.16, "_B": 466.16, "B": 493.88, "z": 0 };
    let audioCtx = null, activeSources = [], recorder = null, audioChunks = [], analyzer = null;

    async function analyzeWithPrecision() {
        const key = document.getElementById('api-key').value;
        const file = document.getElementById('file-input').files[0];
        if(!key || !file) return alert("Key and Image required.");
        document.getElementById('status-msg').innerText = "SIGNAL_PROCESSING...";
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const base64 = reader.result.split(',')[1];
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [
                        { text: "Transcribe this sheet music to raw ABC notation. Include [V:1] for treble and [V:2] for bass. Note dynamics and ties." },
                        { inline_data: { mime_type: file.type, data: base64 } }
                    ] }] })
                });
                const data = await response.json();
                document.getElementById('abc-input').value = data.candidates[0].content.parts[0].text.replace(/```abc|```/g, '').trim();
                document.getElementById('status-msg').innerText = "TRANSCRIPTION_COMPLETE";
            } catch (e) { document.getElementById('status-msg').innerText = "ERROR: " + e.message; }
        };
    }

    function draw() {
        if (!analyzer) return;
        requestAnimationFrame(draw);
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const dataArray = new Uint8Array(analyzer.frequencyBinCount);
        analyzer.getByteTimeDomainData(dataArray);
        ctx.fillStyle = 'black'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 2; ctx.strokeStyle = '#00ff41';
        ctx.beginPath();
        let x = 0, slice = canvas.width / dataArray.length;
        for (let i = 0; i < dataArray.length; i++) {
            let v = dataArray[i] / 128.0, y = v * canvas.height / 2;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            x += slice;
        }
        ctx.stroke();
    }

    function scheduleNote(freq, time, dur, type, vol, dest, pitchScale, vDepth) {
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        const lfo = audioCtx.createOscillator(), lfoGain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq * pitchScale, time);
        
        if (vDepth > 0) {
            lfo.frequency.setValueAtTime(6, time);
            lfoGain.gain.setValueAtTime(vDepth, time);
            lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
            lfo.start(time); lfo.stop(time + dur);
            activeSources.push(lfo);
        }

        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(vol, time + 0.02);
        gain.gain.exponentialRampToValueAtTime(vol * 0.7, time + 0.1);
        gain.gain.setValueAtTime(vol * 0.7, time + dur - 0.05);
        gain.gain.linearRampToValueAtTime(0, time + dur);

        osc.connect(gain).connect(audioCtx.destination);
        gain.connect(analyzer); gain.connect(dest);
        osc.start(time); osc.stop(time + dur);
        activeSources.push(osc);
    }

    async function playAndRecord() {
        if (!audioCtx) audioCtx = new AudioContext();
        stopAll();
        analyzer = audioCtx.createAnalyser();
        draw();
        
        const tempo = 0.5 / parseFloat(document.getElementById('tempo-scale').value);
        const pitch = parseFloat(document.getElementById('pitch-scale').value);
        const vDepth = parseFloat(document.getElementById('vibrato-depth').value);
        const dest = audioCtx.createMediaStreamDestination();
        recorder = new MediaRecorder(dest.stream);
        audioChunks = [];
        recorder.ondataavailable = e => audioChunks.push(e.data);
        recorder.onstop = () => {
            const url = URL.createObjectURL(new Blob(audioChunks, { type: 'audio/webm' }));
            const link = document.getElementById('download-link');
            link.href = url; link.download = `chiptune_${Date.now()}.webm`; link.style.display = 'block';
        };

        const raw = document.getElementById('abc-input').value;
        const v1 = [], v2 = [];
        raw.split('\n').forEach(l => {
            if (l.includes('[V:1]')) v1.push(...l.split('[V:1]')[1].trim().split(/\s+/));
            if (l.includes('[V:2]')) v2.push(...l.split('[V:2]')[1].trim().split(/\s+/));
        });

        recorder.start();
        document.getElementById('status-msg').innerText = "RECORDING_IN_PROGRESS...";
        const d1 = playStream(v1, audioCtx.currentTime + 0.1, tempo, 'square', 0.1, dest, pitch, vDepth);
        const d2 = playStream(v2, audioCtx.currentTime + 0.1, tempo, 'triangle', 0.15, dest, pitch, vDepth);
        setTimeout(() => { recorder.stop(); document.getElementById('status-msg').innerText = "RENDER_COMPLETE"; }, (Math.max(d1, d2) * 1000) + 500);
    }

    function playStream(notes, start, tempo, type, vol, dest, pitch, vDepth) {
        let head = start;
        notes.forEach(s => {
            let match = s.match(/^([\^\\_]*)([a-gA-G,zZ]+)([']*)([\d\/]*)$/);
            if (!match) return;
            let freq = noteMap[match[1] + match[2].toUpperCase().replace(/[,]/g, '')] || noteMap[match[2].toUpperCase().replace(/[,]/g, '')];
            if (freq) {
                if (match[2].toLowerCase() === match[2]) freq *= 2;
                if (match[2].includes(',')) freq /= 2;
                if (match[3]) freq *= Math.pow(2, match[3].length);
                let dur = match[4].includes('/') ? 0.5 : (parseFloat(match[4]) || 1);
                scheduleNote(freq, head, tempo * dur, type, vol, dest, pitch, vDepth);
                head += (tempo * dur);
            } else head += tempo;
        });
        return head - start;
    }

    function stopAll() { activeSources.forEach(s => { try{s.stop()}catch(e){} }); activeSources = []; if(recorder?.state==="recording") recorder.stop(); }
</script>
</body>
</html>
